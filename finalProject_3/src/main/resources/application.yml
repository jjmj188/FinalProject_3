  datasource: #DB 접속이 1개만 있을 경우 (멀티 datasource 대신 단일 datasource 사용)
    driver-class-name: oracle.jdbc.OracleDriver
   #url: jdbc:oracle:thin:@211.63.89.70:1521:xe    # SID 방식
    url: jdbc:oracle:thin:@//211.63.89.70:1521/xe  # oracle 12c 이후부터 PDB 사용시 방식
    username: FINAL_ORAUSER3
    password: sistsix
    type: com.zaxxer.hikari.HikariDataSource
    hikari: #커넥션풀
     #driver-class-name: oracle.jdbc.OracleDriver
     #jdbc-url: jdbc:oracle:thin:@211.63.89.70:1521:xe
     #username: FINAL_ORAUSER3
     #password: sistsix
      connection-timeout: 30000 #클라이언트가 pool에 connection을 요청하는데 기다리는 최대시간을 설정 30초
      maximum-pool-size: 10     #최대 커넥션 개수 설정
      max-lifetime: 1800000     #커넥션 풀에서 살아있을 수 있는 커넥션의 최대 수명시간 1,800초(30분)
      minimum-idle: 5           # 최소 유휴(쓰지 않고 놀리는 것) 커넥션 (5개)
      idle-timeout: 30000       # 30초 후 연결 실패시 예외 발생

