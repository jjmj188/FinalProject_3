<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅 팝업 조각</title>
</head>

<body>
<main th:fragment="chat_popup">

    <style>
    	.chat-overlay {
            position: fixed;
            top: 0; 
            left: 0;
            width: 100vw; 
            height: 100vh;
            background: rgba(0, 0, 0, 0.4); /* 살짝 어두운 반투명 배경 */
            z-index: 9999; /* 채팅창(10000)보다 딱 1단계 아래에 위치 */
            display: none; /* 처음엔 숨김 */
        }
        
        /* 팝업 전체 컨테이너 */
        .chat-modal { position: fixed; top: 0; right: 0; width: 750px; height: 100vh; background: #fff; z-index: 10000; box-shadow: -10px 0 30px rgba(0,0,0,0.15); display: none; overflow: hidden; animation: slideInRight 0.3s ease-out; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .chat-container { display: flex; height: 100%; }
        
        /* 좌측: 채팅방 목록 */
        .chat-sidebar { width: 35%; background: #fff; border-right: 1px solid #ebebeb; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #fff; color: #222; font-size: 18px; font-weight: bold; border-bottom: 1px solid #ebebeb; }
        .room-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .room-item { padding: 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; transition: background 0.2s; display: flex; flex-direction: column; }
        .room-item:hover { background: #f9f9f9; }
        
        /* 우측: 실제 채팅창 */
        .chat-main { width: 65%; display: flex; flex-direction: column; background: #fff; }
        
        /* 헤더 영역 */
        .chat-header { padding: 10px 20px; background: #fff; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ebebeb; height: 60px; z-index: 10; }
        .chat-header h4 { margin: 0; font-size: 18px; font-weight: bold; color: #222; flex: 1; text-align: center; }
        .header-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #333; padding: 5px; }
        
        /* 가로로 나열되는 슬라이딩 메뉴 */
        .chat-options-menu { 
            display: flex; justify-content: space-around; align-items: center;
            background: #fff; overflow: hidden; max-height: 0; 
            transition: max-height 0.3s ease-out; border-bottom: 0px solid transparent;
        }
        .chat-options-menu.show { max-height: 100px; border-bottom: 1px solid #ebebeb; }
        
        /* 개별 메뉴 아이템 스타일 */
        .menu-item { display: flex; flex-direction: column; align-items: center; padding: 15px 0; cursor: pointer; gap: 8px; width: 100%; }
        .menu-item:hover { background: #f9f9f9; }
        .menu-icon { font-size: 26px; }
        .menu-text { font-size: 13px; color: #333; }

        /* 상품 정보 배너 */
        .chat-product-banner { display: flex; padding: 15px 20px; background: #fff; border-bottom: 1px solid #ebebeb; align-items: center; gap: 15px; }
        .chat-product-banner img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; }
        .product-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .price-row { font-size: 16px; font-weight: bold; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .status-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; border: 1px solid #222; color: #222; font-weight: normal; }
        .name-row { font-size: 13px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .btn-reserve { background: #222; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; }

        /* 메시지 영역 */
        #msgDisplayArea { flex: 1; overflow-y: auto; padding: 20px; background: #fff; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrapper { display: flex; align-items: flex-end; gap: 5px; margin-bottom: 5px; }
        .msg-wrapper.mine { justify-content: flex-end; }
        .msg-wrapper.other { justify-content: flex-start; }
        .message { max-width: 70%; padding: 10px 14px; border-radius: 20px; font-size: 14px; word-break: break-all; }
        .msg-mine { background: #222; color: #fff; border-bottom-right-radius: 4px; }
        .msg-other { background: #f2f2f2; color: #222; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 11px; color: #999; margin-bottom: 2px; }

        /* 입력 영역 */
        .chat-input-wrapper { display: flex; flex-direction: column; border-top: 1px solid #ebebeb; }
        #chatInput { width: 100%; height: 80px; padding: 15px 20px; border: none; background: #e2e2e2; outline: none; font-size: 14px; resize: none; box-sizing: border-box; }
        .chat-input-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #fff; }
        .action-icons { display: flex; gap: 15px; color: #333; font-size: 22px; cursor: pointer; }
        .chat-btn-send { background: #222; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px;}
    </style>

    <div id="chatOverlay" class="chat-overlay" onclick="window.toggleChatPopup()"></div>

    <div id="chatModal" class="chat-modal">
        <div class="chat-container">
            <div class="chat-sidebar">
                <div class="sidebar-header">채팅/거래방</div>
                <ul class="room-list" id="roomListArea"></ul>
            </div>

            <div class="chat-main" id="chatMainArea" style="visibility: hidden;">
                <div class="chat-header">
                    <button class="header-btn" onclick="window.toggleChatPopup()">❮</button>
                    <h4 id="currentRoomTitle">판매자 이름</h4>
                    <button class="header-btn" onclick="toggleOptionsMenu()">⋮</button>
                </div>
                
                <div id="chatOptionsMenu" class="chat-options-menu">
                    <div class="menu-item" onclick="actionMute()">
                        <div class="menu-icon">🔔</div>
                        <span class="menu-text">알림끄기</span>
                    </div>
                    <div class="menu-item" onclick="actionReport()">
                        <div class="menu-icon">⚠️</div>
                        <span class="menu-text">신고하기</span>
                    </div>
                    <div class="menu-item" onclick="actionBlock()">
                        <div class="menu-icon">🚫</div>
                        <span class="menu-text">차단하기</span>
                    </div>
                    <div class="menu-item" onclick="actionLeave()">
                        <div class="menu-icon">🚪</div>
                        <span class="menu-text">나가기</span>
                    </div>
                </div>

                <div class="chat-product-banner">
                    <img id="bannerImg" src="https://via.placeholder.com/50" alt="상품이미지">
                    <div class="product-info">
                        <div class="price-row">
                            <span id="bannerPrice">가격 협의</span>
                            <span class="status-badge" id="bannerStatus">판매중</span>
                        </div>
                        <div class="name-row" id="bannerTitle">상품명을 불러오는 중...</div>
                    </div>
                    <button class="btn-reserve" onclick="actionReserve()">예약잡기</button>
                </div>

                <div id="msgDisplayArea"></div>

                <div class="chat-input-wrapper">
                    <textarea id="chatInput" placeholder="메시지를 입력하세요..." onkeypress="handleEnterKey(event)"></textarea>
                    
                    <div class="chat-input-toolbar">
                        <div class="action-icons">
                            <span>＋</span>
                            <span>📸</span>
                            <span>😊</span>
                        </div>
                        <button class="chat-btn-send" onclick="window.sendChatMessage()">전송</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        let stompClient = null;
        let currentRoomId = null;
        const currentUserEmail = /*[[${#authentication.name}]]*/ 'guest';
        const ctxPath = '/finalProject_3'; 
        window.currentSubscription = null; 

        // ★ 추가된 부분 2: 팝업을 열고 닫을 때, 배경막(Overlay)도 같이 켜고 끄도록 수정
        window.toggleChatPopup = function() {
            const modal = document.getElementById('chatModal');
            const overlay = document.getElementById('chatOverlay'); // 추가됨

            if (modal.style.display === 'none' || modal.style.display === '') {
                // 열릴 때
                modal.style.display = 'block';
                overlay.style.display = 'block'; // 배경막 표시
                
                document.getElementById('chatMainArea').style.visibility = 'hidden';
                window.loadChatRoomList(); 
                if (!stompClient || !stompClient.connected) window.connectWebSocket();
            } else {
                // 닫힐 때
                modal.style.display = 'none';
                overlay.style.display = 'none'; // 배경막 숨김
            }
        };

        window.loadChatRoomList = function() {
            fetch(`${ctxPath}/api/chat/roomList`)
                .then(r => r.json())
                .then(data => { if(data.success) window.renderRoomList(data.roomList); });
        };

        window.renderRoomList = function(roomList) {
            const ul = document.getElementById('roomListArea');
            ul.innerHTML = ''; 
            if(!roomList || roomList.length===0) return ul.innerHTML = '<li style="padding:15px; text-align:center;">대화가 없습니다.</li>';
            
            roomList.forEach(room => {
                const li = document.createElement('li');
                li.className = 'room-item';
                
                // ★ 수정됨: 클릭할 때 가격(productPrice)과 상태(tradeStatus)도 같이 넘겨줍니다!
                li.onclick = () => window.openChatRoom(
                    room.roomId, 
                    room.otherUserEmail, 
                    room.productName, 
                    room.productImgUrl, 
                    room.productPrice, // 추가됨
                    room.tradeStatus   // 추가됨
                );
                
                li.innerHTML = `
                    <div style="font-weight:bold; margin-bottom:5px;">${room.otherUserEmail}</div>
                    <div style="font-size:13px; color:#666;">[${room.productName}] ${room.lastMessage || '대화를 시작하세요.'}</div>
                `;
                ul.appendChild(li);
            });
        };

        // ★ 수정됨: 매개변수로 price, status 추가
        window.openChatRoom = function(roomId, targetUser, productName, imgUrl, price, status) {
            currentRoomId = roomId;
            document.getElementById('chatMainArea').style.visibility = 'visible';
            
            document.getElementById('currentRoomTitle').innerText = targetUser;
            document.getElementById('bannerTitle').innerText = productName;
            
            // 이미지 세팅 (방어 코드 포함)
            const bannerImg = document.getElementById('bannerImg');
            if(imgUrl) {
                bannerImg.src = imgUrl.startsWith('/') ? ctxPath + imgUrl : imgUrl;
            } else {
                bannerImg.src = 'https://via.placeholder.com/50?text=No+Image';
            }

            // ★ 추가됨: 가격 세팅 (숫자면 3자리마다 콤마 찍고 '원' 붙이기)
            const priceEl = document.getElementById('bannerPrice');
            if(price !== undefined && price !== null) {
                priceEl.innerText = price.toLocaleString() + '원';
            } else {
                priceEl.innerText = '가격 정보 없음';
            }

            // ★ 추가됨: 판매상태 세팅
            const statusEl = document.getElementById('bannerStatus');
            statusEl.innerText = status ? status : '상태 모름';
            
            // 상태에 따라 뱃지 색상을 바꾸고 싶다면 이런 디테일도 가능합니다!
            if(status === '판매완료') {
                statusEl.style.background = '#666';
                statusEl.style.color = '#fff';
            } else if(status === '예약중' || status === '거래중') {
                statusEl.style.background = '#00c73c';
                statusEl.style.color = '#fff';
            } else {
                statusEl.style.background = '#fff';
                statusEl.style.color = '#222';
            }

            // 메시지 초기화
            document.getElementById('msgDisplayArea').innerHTML = ''; 
            document.getElementById('chatOptionsMenu').classList.remove('show'); 
            
            const chatInput = document.getElementById('chatInput');
            chatInput.value = ''; 

            fetch(`${ctxPath}/api/chat/messages/${roomId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.success && data.messages && data.messages.length > 0) {
                        data.messages.forEach(msg => window.showMessage(msg));
                    } else {
                        chatInput.value = `[상품정보 보내기] 안녕하세요. [${productName}] 보고 문의드립니다.`;
                    }
                });

            if (stompClient && stompClient.connected) window.subscribeToRoom(roomId);
            else window.connectWebSocket(() => window.subscribeToRoom(roomId));
        };

        window.subscribeToRoom = function(roomId) {
            if (window.currentSubscription) window.currentSubscription.unsubscribe();
            window.currentSubscription = stompClient.subscribe(`/topic/room/${roomId}`, function(msg) {
                window.showMessage(JSON.parse(msg.body));
            });
        };

        window.connectWebSocket = function(cb) {
            if (stompClient && stompClient.connected) { if(cb) cb(); return; }
            stompClient = Stomp.over(new SockJS(`${ctxPath}/ws-chat`));
            stompClient.connect({}, () => { if(cb) cb(); });
        };

        window.handleEnterKey = function(event) {
            if (event.keyCode === 13 && !event.shiftKey) {
                event.preventDefault(); 
                window.sendChatMessage();
            }
        };

        window.sendChatMessage = function() {
            const input = document.getElementById('chatInput');
            if (!input.value.trim() || !currentRoomId) return;
            const msg = { sender: currentUserEmail, content: input.value.trim(), roomId: currentRoomId, timestamp: new Date().toISOString() };
            stompClient.send("/app/chat/send", {}, JSON.stringify(msg));
            input.value = ''; 
        };

        window.showMessage = function(message) {
            const area = document.getElementById('msgDisplayArea');
            const isMine = message.sender === currentUserEmail;
            
            const date = message.timestamp ? new Date(message.timestamp) : new Date();
            const timeStr = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');

            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'other'}`;
            
            const bubbleHtml = `<div class="message ${isMine ? 'msg-mine' : 'msg-other'}">${message.content}</div>`;
            const timeHtml = `<div class="msg-time">${timeStr}</div>`;

            wrapper.innerHTML = isMine ? timeHtml + bubbleHtml : bubbleHtml + timeHtml;
            area.appendChild(wrapper);
            area.scrollTop = area.scrollHeight; 
        };

        window.toggleOptionsMenu = function() {
            document.getElementById('chatOptionsMenu').classList.toggle('show');
        };

        window.actionMute = function() { alert("알림끄기 API 연동 필요"); toggleOptionsMenu(); };
        window.actionReport = function() { alert("신고하기 API 연동 필요"); toggleOptionsMenu(); };
        window.actionBlock = function() { alert("차단하기 API 연동 필요"); toggleOptionsMenu(); };
        window.actionLeave = function() { 
            if(!currentRoomId) return; 

            if(confirm("정말 이 채팅방을 나가시겠습니까?\n(대화 내역이 모두 삭제됩니다.)")) {
                fetch(`${ctxPath}/api/chat/leave/${currentRoomId}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if(data.success) {
                        toggleOptionsMenu(); 
                        document.getElementById('chatMainArea').style.visibility = 'hidden';
                        
                        if (window.currentSubscription) {
                            window.currentSubscription.unsubscribe();
                            window.currentSubscription = null;
                        }
                        currentRoomId = null;
                        window.loadChatRoomList(); 
                    } else {
                        alert(data.message);
                    }
                })
                .catch(error => console.error("나가기 에러:", error));
            } else {
                toggleOptionsMenu(); 
            }
        };
        window.actionReserve = function() { alert("예약잡기 로직 구현 필요"); };

        /*]]>*/
    </script>
</main>
</body>
</html>
