<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::head}, ~{::main}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="ko">
<head>
    <style>
        /* 팝업 전체 컨테이너 */
        .chat-modal {
            position: fixed; top: 10%; right: 5%; width: 55%; height: 75%;
            background: #fff; z-index: 10000; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden;
            display: none; /* 초기 상태 숨김 */
        }

        .chat-container { display: flex; height: 100%; }

        /* 좌측: 채팅방 목록 (카톡 스타일) */
        .chat-sidebar {
            width: 35%; background: #f2f2f2; border-right: 1px solid #ddd;
            display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 20px; background: #222; color: #fff;
            font-size: 18px; font-weight: bold; border-bottom: 1px solid #333;
        }
        .room-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .room-item {
            padding: 15px; border-bottom: 1px solid #e5e5e5; cursor: pointer;
            transition: background 0.2s; display: flex; align-items: center;
        }
        .room-item:hover { background: #e9e9e9; }
        .room-item.active { background: #fff; border-left: 4px solid #222; }

        /* 우측: 실제 채팅창 */
        .chat-main { width: 65%; display: flex; flex-direction: column; background: #fff; }
        .chat-header {
            padding: 15px 20px; background: #222; color: #fff;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-header h4 { margin: 0; font-size: 16px; }
        .close-chat { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }

        #msgDisplayArea {
            flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9;
            display: flex; flex-direction: column; gap: 10px;
        }

        /* 메시지 풍선 스타일 */
        .message { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; position: relative; }
        .msg-mine { align-self: flex-end; background: #222; color: #fff; border-bottom-right-radius: 2px; }
        .msg-other { align-self: flex-start; background: #e2e2e2; color: #222; border-bottom-left-radius: 2px; }

        /* 입력 영역 */
        .chat-input-row {
            padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px;
        }
        .chat-input-row input {
            flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none;
        }
        .chat-input-row input:focus { border-color: #222; }
        .chat-btn-send {
            background: #222; color: #fff; border: none; padding: 0 20px;
            border-radius: 6px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>

<body>
<main>
	<div th:fragment="chat_popup">
    <div id="chatModal" class="chat-modal" style="display:none; position:fixed; top:10%; right:5%; width:50%; height:75%; background:white; z-index:10000; border:1px solid #ddd; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <div class="chat-container" style="display:flex; height:100%;">
            <div style="width:35%; background:#f2f2f2; border-right:1px solid #ddd; padding:15px;">
                <h5 style="margin-top:0;">채팅 목록</h5>
                <ul id="roomListArea" style="list-style:none; padding:0;"></ul>
            </div>
            <div style="width:65%; display:flex; flex-direction:column;">
                <div style="padding:15px; background:#222; color:#fff; display:flex; justify-content:space-between;">
                    <span>실시간 채팅</span>
                    <button onclick="toggleChatPopup()" style="color:#fff; background:none; border:none; cursor:pointer; font-size:20px;">×</button>
                </div>
                <div id="msgDisplayArea" style="flex:1; overflow-y:auto; padding:20px; background:#fff;"></div>
                <div style="padding:15px; border-top:1px solid #eee; display:flex; gap:5px;">
                    <input type="text" id="chatInput" style="flex:1; padding:10px; border:1px solid #ddd;" placeholder="메시지 입력...">
                    <button onclick="sendChatMessage()" style="padding:10px 20px; background:#222; color:#fff; border:none; cursor:pointer;">전송</button>
                </div>
            </div>
        </div>
    </div>
</div>
</main>

<script th:inline="javascript">
    /*<![CDATA[*/
    let stompClient = null;
    let currentRoomId = null;
    const currentUserEmail = /*[[${#authentication.name}]]*/ 'guest';

    // 1. 팝업 열기/닫기 (Header의 이모지 버튼에서 호출)
    window.toggleChatPopup = function() {
        const modal = document.getElementById('chatModal');
        if (modal.style.display === 'none' || modal.style.display === '') {
            modal.style.display = 'block';
            connectWebSocket(); // 열 때 웹소켓 연결
        } else {
            modal.style.display = 'none';
        }
    }

    // 2. 웹소켓 연결 (WebSocketConfig.java에 설정한 /ws-chat 주소)
    function connectWebSocket() {
        if (stompClient !== null && stompClient.connected) return;

        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);
        }, function(error) {
            console.error('WebSocket Error: ' + error);
        });
    }

    // 3. 메시지 전송 (ChatController.java로 전송)
    window.sendChatMessage = function() {
        const content = document.getElementById('chatInput').value.trim();
        if (!content || !stompClient) return;

        const chatMessage = {
            sender: currentUserEmail,
            content: content,
            roomId: currentRoomId || 'default_room', // 선택된 방 ID
            timestamp: new Date().toISOString()
        };

        // /app/chat/send는 WebSocketConfig의 setApplicationDestinationPrefixes("/")와 
        // ChatController의 @MessageMapping("/chat/send")를 조합한 주소입니다.
        stompClient.send("/app/chat/send", {}, JSON.stringify(chatMessage));
        document.getElementById('chatInput').value = '';
    }

    // 4. 메시지 수신 및 화면 출력
    function showMessage(message) {
        const area = document.getElementById('msgDisplayArea');
        const isMine = message.sender === currentUserEmail;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isMine ? 'msg-mine' : 'msg-other'}`;
        msgDiv.innerText = message.content;
        
        area.appendChild(msgDiv);
        area.scrollTop = area.scrollHeight; // 스크롤 하단 이동
    }
    /*]]>*/
</script>
</body>
</html>
