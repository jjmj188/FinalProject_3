<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --card-bg:#ffffff; --card-border:#eaeaea; }
        .main-content { flex:1; min-width:0; padding:2rem 2.5rem; }

        .dashboard-header {
            background:linear-gradient(135deg,#2c3e50 0%,#3498db 100%);
            border-radius:16px; padding:1.8rem 2rem;
            color:white; margin-bottom:1.8rem;
        }
        .dashboard-header h3 { font-size:1.4rem; font-weight:700; margin:0; }
        .dashboard-header p  { font-size:.85rem; opacity:.85; margin:.3rem 0 0; }
        .current-time { font-size:.9rem; opacity:.9; font-weight:600; }

        /* 시스템 상태 */
        .sys-card {
            background:white; border-radius:12px; padding:1.2rem 1.4rem;
            border:1px solid var(--card-border); box-shadow:0 2px 8px rgba(0,0,0,.04);
            display:flex; align-items:center; gap:1rem;
        }
        .sys-card .icon-wrap { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
        .sys-card .val { font-size:1.3rem; font-weight:700; line-height:1.2; }
        .sys-card .lbl { font-size:.75rem; color:#888; margin-top:2px; }

        /* KPI 카드 */
        .kpi-card {
            background:white; border-radius:14px; padding:1.5rem;
            border:1px solid var(--card-border); box-shadow:0 2px 10px rgba(0,0,0,.04);
            position:relative; overflow:hidden; transition:transform .2s, box-shadow .2s;
        }
        .kpi-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,.08); }
        .kpi-card .accent-bar { position:absolute; top:0; left:0; right:0; height:4px; border-radius:14px 14px 0 0; }
        .kpi-card .kpi-icon { font-size:2rem; margin-bottom:.8rem; width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; }
        .kpi-card .kpi-val  { font-size:1.8rem; font-weight:800; line-height:1; }
        .kpi-card .kpi-lbl  { font-size:.78rem; color:#888; margin-top:.3rem; font-weight:500; }
        .kpi-card .kpi-link { font-size:.75rem; color:#aaa; text-decoration:none; }
        .kpi-card .kpi-link:hover { color:#666; }

        /* 패널 */
        .panel-box {
            background:white; padding:1.5rem; border-radius:14px;
            border:1px solid var(--card-border); box-shadow:0 2px 10px rgba(0,0,0,.04); height:100%;
        }
        .panel-title { font-size:.9rem; font-weight:700; color:#2c3e50; margin-bottom:1.2rem; display:flex; align-items:center; gap:.4rem; }

        /* Todo */
        .todo-item { padding:8px 10px; border-radius:8px; transition:background .15s; display:flex; align-items:center; }
        .todo-item:hover { background:#f8f9fa; }
        .todo-item input:checked + label { text-decoration:line-through; color:#adb5bd; }
        .todo-label { flex:1; margin-left:8px; font-size:.88rem; cursor:pointer; }
        .todo-del { background:none; border:none; color:#ccc; font-size:1rem; padding:0 4px; line-height:1; cursor:pointer; border-radius:4px; }
        .todo-del:hover { color:#e74c3c; background:#fff0f0; }

        /* 인기검색어 */
        .keyword-item {
            display:flex; align-items:center; gap:12px;
            padding:10px 14px; border-radius:10px; margin-bottom:6px;
            background:#f8f9fc; transition:background .15s;
        }
        .keyword-item:hover { background:#f0f3ff; }
        .rank-badge {
            width:28px; height:28px; border-radius:8px; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            font-size:.78rem; font-weight:800;
        }
        .rank-1 { background:linear-gradient(135deg,#f6d365,#fda085); color:#fff; }
        .rank-2 { background:linear-gradient(135deg,#c9d6df,#a8b8c8); color:#fff; }
        .rank-3 { background:linear-gradient(135deg,#f093fb,#f5576c); color:#fff; }
        .rank-n { background:#e9ecef; color:#6c757d; }
        .keyword-text { font-size:.88rem; font-weight:600; color:#2e3750; flex:1; }
        .keyword-bar-wrap { width:80px; }
        .keyword-bar { height:6px; border-radius:3px; background:#e9ecef; overflow:hidden; }
        .keyword-bar-inner { height:100%; border-radius:3px; background:linear-gradient(90deg,#4e73df,#667eea); }
        .keyword-count { font-size:.8rem; font-weight:700; color:#4e73df; min-width:28px; text-align:right; }

        .chart-container { position:relative; height:240px; width:100%; }
        .chart-sm { position:relative; height:180px; width:100%; }
    </style>
</head>
<body class="d-flex">
<aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>

<main class="main-content">

    <!-- 헤더 -->
    <div class="dashboard-header d-flex justify-content-between align-items-center">
        <div>
            <h3><i class="bi bi-speedometer2 me-2"></i>서비스 현황 대시보드</h3>
            <p>관리자님, 플랫폼의 실시간 현황을 확인하세요.</p>
        </div>
        <div class="current-time" id="liveTime">--:--:--</div>
    </div>

    <!-- 시스템 상태 -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="sys-card">
                <div class="icon-wrap" style="background:#e8f4ff;color:#3498db;"><i class="bi bi-lightning-charge-fill"></i></div>
                <div><div class="val" id="apiRequests">-</div><div class="lbl">API 요청 수</div></div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="sys-card">
                <div class="icon-wrap" style="background:#fff0e8;color:#e67e22;"><i class="bi bi-cpu-fill"></i></div>
                <div><div class="val" id="cpuUsage">-</div><div class="lbl">CPU 사용률</div></div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="sys-card">
                <div class="icon-wrap" style="background:#edfff4;color:#27ae60;"><i class="bi bi-memory"></i></div>
                <div><div class="val" id="memoryUsage">-</div><div class="lbl">메모리 사용</div></div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="sys-card">
                <div class="icon-wrap" style="background:#f5eeff;color:#9b59b6;"><i class="bi bi-database-fill"></i></div>
                <div><div class="val" id="dbConnections">-</div><div class="lbl">DB 커넥션</div></div>
            </div>
        </div>
    </div>

    <!-- KPI 카드 -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="kpi-card">
                <div class="accent-bar" style="background:#e74c3c;"></div>
                <div class="kpi-icon" style="background:#fdecea;color:#e74c3c;"><i class="bi bi-exclamation-triangle-fill"></i></div>
                <div class="kpi-val text-danger" th:text="${reportsAndInquiries != null ? reportsAndInquiries : 0}">0</div>
                <div class="kpi-lbl">미처리 신고 및 문의</div>
                <a th:href="@{/admin/complaint}" class="kpi-link">바로가기 →</a>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="kpi-card">
                <div class="accent-bar" style="background:#3498db;"></div>
                <div class="kpi-icon" style="background:#e8f4ff;color:#3498db;"><i class="bi bi-megaphone-fill"></i></div>
                <div class="kpi-val text-primary" th:text="${adInquiries != null ? adInquiries : 0}">0</div>
                <div class="kpi-lbl">광고 승인 대기</div>
                <a th:href="@{/admin/contents}" class="kpi-link">바로가기 →</a>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="kpi-card">
                <div class="accent-bar" style="background:#27ae60;"></div>
                <div class="kpi-icon" style="background:#edfff4;color:#27ae60;"><i class="bi bi-box-seam-fill"></i></div>
                <div class="kpi-val text-success" th:text="${todayProducts != null ? todayProducts : 0}">0</div>
                <div class="kpi-lbl">오늘 등록 상품</div>
                <a th:href="@{/admin/product}" class="kpi-link">바로가기 →</a>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="kpi-card">
                <div class="accent-bar" style="background:#f39c12;"></div>
                <div class="kpi-icon" style="background:#fff8e1;color:#f39c12;"><i class="bi bi-currency-exchange"></i></div>
                <div class="kpi-val"
                     th:text="${dailyTradeAmount != null ? #numbers.formatInteger(dailyTradeAmount, 0, 'COMMA') + '원' : '0원'}">0원</div>
                <div class="kpi-lbl">일간 거래액 (추정)</div>
                <a th:href="@{/admin/transaction}" class="kpi-link">바로가기 →</a>
            </div>
        </div>
    </div>

    <!-- 가입자 추이 + 할 일 -->
    <div class="row g-3 mb-4">
        <div class="col-lg-7">
            <div class="panel-box">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="panel-title mb-0"><i class="bi bi-person-plus-fill text-primary"></i>사용자 유입 추이</div>
                    <div class="btn-group btn-group-sm">
                        <button type="button" class="btn btn-outline-primary active" id="btnWeek" onclick="updateUserChart('week')">주간</button>
                        <button type="button" class="btn btn-outline-primary" id="btnMonth" onclick="updateUserChart('month')">월간</button>
                    </div>
                </div>
                <div class="chart-container"><canvas id="userChart"></canvas></div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="panel-box">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="panel-title mb-0"><i class="bi bi-check2-square text-success"></i>오늘 할 일</div>
                    <button class="btn btn-sm btn-outline-secondary" onclick="addTodo()"><i class="bi bi-plus"></i> 추가</button>
                </div>
                <div id="todoContainer" style="max-height:270px;overflow-y:auto;"></div>
                <div id="todoEmpty" class="text-center text-muted py-3 small" style="display:none;">
                    <i class="bi bi-emoji-smile"></i> 오늘 할 일이 없습니다!
                </div>
            </div>
        </div>
    </div>

    <!-- 인기 검색어 + 탈퇴 사유 -->
    <div class="row g-3">
        <div class="col-lg-7">
            <div class="panel-box">
                <div class="panel-title"><i class="bi bi-fire text-danger"></i>인기 검색어 (24h)</div>
                <div id="keywordList">
                    <div th:if="${#lists.isEmpty(popularKeywords)}" class="text-center text-muted py-4 small">
                        최근 검색 기록이 없습니다.
                    </div>
                    <div th:each="s, st : ${popularKeywords}" class="keyword-item">
                        <span th:classappend="${st.count == 1} ? 'rank-badge rank-1' :
                                             (${st.count == 2} ? 'rank-badge rank-2' :
                                             (${st.count == 3} ? 'rank-badge rank-3' : 'rank-badge rank-n'))"
                              th:text="${st.count}">1</span>
                        <span class="keyword-text" th:text="${s.keyword}">키워드</span>
                        <div class="keyword-bar-wrap">
                            <div class="keyword-bar">
                                <div class="keyword-bar-inner"
                                     th:style="'width:' + (${s.count * 100 / (#lists.isEmpty(popularKeywords) ? 1 : popularKeywords[0].count)}) + '%'"></div>
                            </div>
                        </div>
                        <span class="keyword-count" th:text="${s.count}">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="panel-box">
                <div class="panel-title"><i class="bi bi-pie-chart-fill text-warning"></i>탈퇴 사유 분석</div>
                <div class="chart-sm"><canvas id="exitChart"></canvas></div>
                <div id="exitNoData" class="text-center text-muted small py-4" style="display:none;">
                    <i class="bi bi-info-circle"></i> 탈퇴 사유 데이터가 없습니다.
                </div>
            </div>
        </div>
    </div>

</main>

<script th:inline="javascript">
    // 실시간 시계
    function updateClock() {
        const now = new Date();
        const pad = n => String(n).padStart(2,'0');
        document.getElementById('liveTime').innerText =
            `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // 시스템 메트릭
    const actuator = "/finalProject_3/actuator/metrics";
    [
        { url: actuator + "/http.server.requests", el:"apiRequests", fn: d => Math.round(d.measurements.find(m=>m.statistic==="COUNT").value) },
        { url: actuator + "/system.cpu.usage",     el:"cpuUsage",    fn: d => (d.measurements[0].value*100).toFixed(1)+"%" },
        { url: actuator + "/jvm.memory.used",      el:"memoryUsage", fn: d => (d.measurements[0].value/(1024*1024)).toFixed(0)+" MB" },
        { url: actuator + "/hikaricp.connections.active", el:"dbConnections", fn: d => d.measurements[0].value }
    ].forEach(({url,el,fn}) => {
        fetch(url,{credentials:"same-origin"}).then(r=>r.ok?r.json():null)
            .then(d=>{if(d) document.getElementById(el).innerText=fn(d);}).catch(()=>{});
    });

    // 가입자 차트 (선그래프)
    let userChart;
    function renderUserChart(labels, data) {
        const canvas = document.getElementById('userChart');
        const ctx = canvas.getContext('2d');
        const grad = ctx.createLinearGradient(0,0,0,240);
        grad.addColorStop(0,'rgba(52,152,219,0.3)');
        grad.addColorStop(1,'rgba(52,152,219,0.02)');
        if (userChart) userChart.destroy();
        userChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '신규 가입',
                    data: data,
                    fill: true,
                    backgroundColor: grad,
                    borderColor: '#3498db',
                    borderWidth: 2.5,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#3498db',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    tension: 0.35
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display:false } },
                scales: {
                    y: { beginAtZero:true, grid:{color:'#f0f0f0'}, ticks:{font:{size:11}} },
                    x: { grid:{display:false}, ticks:{font:{size:11}} }
                },
                animation: { duration:600, easing:'easeOutQuart' }
            }
        });
    }

    function updateUserChart(type) {
        document.getElementById('btnWeek').classList.toggle('active', type==='week');
        document.getElementById('btnMonth').classList.toggle('active', type==='month');
        fetch(`/finalProject_3/admin/user-stats?type=${type}`)
            .then(r=>r.json())
            .then(d=>renderUserChart(d.labels,d.data))
            .catch(()=>{
                if(type==='week') renderUserChart(['월','화','수','목','금','토','일'],[0,0,0,0,0,0,0]);
                else renderUserChart(['10월','11월','12월','1월','2월','3월'],[0,0,0,0,0,0]);
            });
    }
    document.addEventListener('DOMContentLoaded',()=>updateUserChart('week'));

    // 탈퇴 사유 차트
    // 컨트롤러에서 해당 데이터 추가 필요: withdrawStats {labels, data}
    const withdrawStats = /*[[${withdrawStats}]]*/ {labels:[],data:[]};
    const hasRealReason = withdrawStats && withdrawStats.labels && withdrawStats.labels.length > 0
        && !(withdrawStats.labels.length === 1 && withdrawStats.labels[0] === '기타');
    if (hasRealReason) {
        new Chart(document.getElementById('exitChart'), {
            type: 'doughnut',
            data: {
                labels: withdrawStats.labels,
                datasets: [{
                    data: withdrawStats.data,
                    backgroundColor:['#3498db','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c'],
                    borderWidth:2, borderColor:'#fff'
                }]
            },
            options: {
                maintainAspectRatio:false, cutout:'65%',
                plugins:{ legend:{ position:'bottom', labels:{ font:{size:11}, padding:10 } } }
            }
        });
    } else {
        document.getElementById('exitChart').style.display='none';
        document.getElementById('exitNoData').style.display='block';
    }

    // ── Todo (localStorage 자동저장) ──────────────────────────────
    const TODO_KEY = 'admin_todo_list';
    let todoCount = 200;

    function saveTodos() {
        const items = [];
        document.querySelectorAll('#todoContainer .todo-item').forEach(item => {
            const cb  = item.querySelector('input[type="checkbox"]');
            const lbl = item.querySelector('.todo-label');
            if (lbl) items.push({ text: lbl.textContent, checked: cb ? cb.checked : false });
        });
        localStorage.setItem(TODO_KEY, JSON.stringify(items));
        checkTodoEmpty();
    }

    function loadTodos() {
        const saved = localStorage.getItem(TODO_KEY);
        const container = document.getElementById('todoContainer');
        container.innerHTML = '';

        const defaults = [
            { text:'미답변 문의내역 확인', checked:false },
            { text:'신규 광고 승인 요청 처리', checked:false }
        ];
        const items = saved ? JSON.parse(saved) : defaults;

        items.forEach((item, i) => {
            todoCount++;
            const id = `todo-${todoCount}`;
            container.insertAdjacentHTML('beforeend', makeTodoHtml(id, todoCount, item.text, item.checked));
        });
        checkTodoEmpty();
    }

    function makeTodoHtml(id, cnt, text, checked) {
        return `<div class="todo-item" id="${id}">
            <input type="checkbox" id="tc${cnt}" class="form-check-input flex-shrink-0"
                   ${checked ? 'checked' : ''} onchange="saveTodos()">
            <label for="tc${cnt}" class="todo-label">${text}</label>
            <button class="todo-del" onclick="deleteTodo('${id}')" title="삭제">×</button>
        </div>`;
    }

    function checkTodoEmpty() {
        const items = document.querySelectorAll('#todoContainer .todo-item');
        document.getElementById('todoEmpty').style.display = items.length === 0 ? 'block' : 'none';
    }

    function deleteTodo(id) {
        const el = document.getElementById(id);
        if (el) {
            el.style.transition = 'opacity 0.2s';
            el.style.opacity = '0';
            setTimeout(() => { el.remove(); saveTodos(); }, 200);
        }
    }

    function addTodo() {
        const text = prompt('할 일을 입력하세요.');
        if (!text || !text.trim()) return;
        todoCount++;
        const id = `todo-${todoCount}`;
        document.getElementById('todoContainer').insertAdjacentHTML('beforeend',
            makeTodoHtml(id, todoCount, text.trim(), false));
        document.getElementById('todoEmpty').style.display = 'none';
        saveTodos();
    }

    document.addEventListener('DOMContentLoaded', loadTodos);
</script>
</body>
</html>
