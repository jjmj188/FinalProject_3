<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>문의 내역 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .badge-pending { background-color: #f6c23e; color:#fff; }
        .badge-completed { background-color: #1cc88a; color:#fff; }
        .text-truncate-custom { max-width: 250px; display: inline-block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body class="d-flex">
    <aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>
    <main class="main-content">
        <div class="container-fluid">
            <h4 class="fw-bold mb-4">고객 문의 관리</h4>

            <!-- 필터 폼 -->
            <form method="get" th:action="@{/admin/inquiry}" class="mb-3 d-flex gap-2 align-items-center">
                <label class="fw-bold me-2">상태:</label>
                <select name="status" class="form-select form-select-sm" style="width:150px;" onchange="this.form.submit()">
                    <option value="ALL" th:selected="${selectedStatus == 'ALL'}">전체</option>
                    <option value="대기" th:selected="${selectedStatus == '대기'}">대기</option>
                    <option value="답변완료" th:selected="${selectedStatus == '답변완료'}">답변완료</option>
                </select>
                <span class="text-muted small">전체 <strong th:text="${totalCount}"></strong>건</span>
            </form>

            <div class="dashboard-card">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width:80px;">번호</th>
                                <th style="width:130px;">문의 날짜</th>
                                <th style="width:200px;">이메일</th>
                                <th>제목</th>
                                <th style="width:100px;">상태</th>
                                <th style="width:100px;">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(inquiryList)}">
                                <td colspan="6" class="text-center text-muted">문의가 없습니다.</td>
                            </tr>
                            <tr th:each="inquiry : ${inquiryList}">
                                <td th:text="${inquiry.inquiryId}"></td>
                                <td th:text="${#dates.format(inquiry.createdAt, 'yyyy-MM-dd')}"></td>
                                <td th:text="${inquiry.memberEmail}"></td>
                                <td>
                                    <span class="text-truncate-custom" th:text="${inquiry.title}"></span>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${inquiry.inquiryStatus == '답변완료' ? 'badge-completed' : 'badge-pending'}"
                                          th:text="${inquiry.inquiryStatus}"></span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-dark"
                                            th:attr="data-id=${inquiry.inquiryId},
                                                     data-title=${inquiry.title},
                                                     data-content=${inquiry.content},
                                                     data-answer=${inquiry.adminAnswer}"
                                            onclick="openInquiryModal(this)">답변</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 페이징 -->
                <nav th:if="${totalPages > 1}" aria-label="Page navigation">
                    <ul class="pagination justify-content-center mt-3">
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/inquiry(page=${currentPage-1}, status=${selectedStatus})}">이전</a>
                        </li>
                        <li class="page-item" th:each="p : ${#numbers.sequence(1, totalPages)}"
                            th:classappend="${p == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/admin/inquiry(page=${p}, status=${selectedStatus})}" th:text="${p}"></a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/inquiry(page=${currentPage+1}, status=${selectedStatus})}">다음</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>

    <!-- 문의 답변 모달 -->
    <div class="modal fade" id="inquiryModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">문의 상세 및 답변</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">제목</label>
                        <div id="modalTitle" class="p-2 bg-light border rounded"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">문의 내용</label>
                        <div id="modalContent" class="p-3 bg-light border rounded" style="min-height:80px;"></div>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label fw-bold">답변 작성</label>
                        <textarea id="modalAnswer" class="form-control" rows="5" placeholder="답변 내용을 입력하세요."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="saveAnswer()">답변 저장</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentInquiryId = null;
        let inquiryModalInst = null;

        function openInquiryModal(btn) {
            currentInquiryId = btn.dataset.id;
            document.getElementById('modalTitle').innerText = btn.dataset.title || '';
            document.getElementById('modalContent').innerText = btn.dataset.content || '';
            document.getElementById('modalAnswer').value = btn.dataset.answer || '';
            inquiryModalInst = new bootstrap.Modal(document.getElementById('inquiryModal'));
            inquiryModalInst.show();
        }

        function saveAnswer() {
            const answer = document.getElementById('modalAnswer').value.trim();
            if (!answer) { alert('답변 내용을 입력하세요.'); return; }
            fetch('/admin/inquiry/answer', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'inquiryId=' + currentInquiryId + '&adminAnswer=' + encodeURIComponent(answer)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('답변이 저장되었습니다.');
                    inquiryModalInst.hide();
                    location.reload();
                } else alert('저장 실패');
            });
        }
    </script>
</body>
</html>
