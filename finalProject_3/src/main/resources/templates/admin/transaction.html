<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>거래 내역 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
    </style>
</head>
<body class="d-flex">
    <aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>
    <main class="main-content">
        <div class="container-fluid">
            <h4 class="fw-bold mb-4">거래 프로세스 관리</h4>

            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="dashboard-card border-start border-primary border-4">
                        <div class="small text-muted fw-bold">전체 거래 수</div>
                        <div class="h3 fw-bold mb-0" th:text="${totalCount + '건'}">0건</div>
                    </div>
                </div>
            </div>

            <div class="dashboard-card">
                <h5 class="fw-bold mb-4">거래 내역 목록</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>거래번호</th>
                                <th>상품명</th>
                                <th>구매자</th>
                                <th>판매자</th>
                                <th>거래 금액</th>
                                <th>거래일시</th>
                                <th>상태</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(tradeList)}">
                                <td colspan="7" class="text-center text-muted">거래 내역이 없습니다.</td>
                            </tr>
                            <tr th:each="trade : ${tradeList}">
                                <td th:text="${trade.transactionId}"></td>
                                <td th:text="${trade.productName}"></td>
                                <td th:text="${trade.buyerNickname != null ? trade.buyerNickname : '-'}"></td>
                                <td th:text="${trade.sellerNickname != null ? trade.sellerNickname : '-'}"></td>
                                <td th:text="${#numbers.formatInteger(trade.amount, 0, 'COMMA') + '원'}"></td>
                                <td th:text="${#dates.format(trade.tradeDate, 'yyyy-MM-dd HH:mm')}"></td>
                                <td th:text="${trade.tradeStatus}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 페이징 -->
                <nav th:if="${totalPages > 1}" aria-label="Page navigation">
                    <ul class="pagination justify-content-center mt-3">
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/transaction(page=${currentPage-1})}">이전</a>
                        </li>
                        <li class="page-item" th:each="p : ${#numbers.sequence(1, totalPages)}"
                            th:classappend="${p == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/admin/transaction(page=${p})}" th:text="${p}"></a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/transaction(page=${currentPage+1})}">다음</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
