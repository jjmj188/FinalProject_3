<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
</head>
<body class="d-flex">
    <aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>
    <main style="flex:1;padding:25px;">
        <div class="container-fluid">
            <h4 class="fw-bold mb-4">상품 상세</h4>
            <div th:if="${product == null}" class="alert alert-warning">상품을 찾을 수 없습니다.</div>
            <div th:if="${product != null}" class="card p-4">
                <div class="row mb-2">
                    <div class="col-md-3 fw-bold">상품번호</div>
                    <div class="col-md-9" th:text="${product.productNo}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-md-3 fw-bold">상품명</div>
                    <div class="col-md-9" th:text="${product.productName}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-md-3 fw-bold">가격</div>
                    <div class="col-md-9" th:text="${#numbers.formatInteger(product.productPrice, 0, 'COMMA') + '원'}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-md-3 fw-bold">카테고리</div>
                    <div class="col-md-9" th:text="${product.categoryName}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-md-3 fw-bold">판매자</div>
                    <div class="col-md-9" th:text="${product.sellerNickname + ' (' + product.sellerEmail + ')'}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-md-3 fw-bold">거래방식</div>
                    <div class="col-md-9" th:text="${product.tradeMethod}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-md-3 fw-bold">거래상태</div>
                    <div class="col-md-9" th:text="${product.tradeStatus}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-md-3 fw-bold">등록일</div>
                    <div class="col-md-9" th:text="${product.regDate}"></div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-3 fw-bold">상품 설명</div>
                    <div class="col-md-9" th:text="${product.productDesc}" style="white-space:pre-wrap;"></div>
                </div>
                <div th:if="${product.images != null and not #lists.isEmpty(product.images)}">
                    <div class="fw-bold mb-2">상품 이미지</div>
                    <div class="d-flex flex-wrap gap-2">
                        <img th:each="img : ${product.images}" th:src="${img}"
                             style="width:120px;height:120px;object-fit:cover;border-radius:8px;" alt="상품이미지">
                    </div>
                </div>
                <div class="mt-3">
                    <a th:href="@{/admin/product}" class="btn btn-secondary">목록으로</a>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
