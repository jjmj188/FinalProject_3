<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원관리 - 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
    <style>
        .product-badge {
            font-size: 0.75rem;
        }
        .modal-dialog { max-width: 750px; }
        .products-section { max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body class="d-flex">
<aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>
    <main class="main-content w-100">
        <h4 class="mb-4 fw-bold">회원 관리</h4>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="stat-card text-center">
                    <div class="text-muted small">총 가입자 수</div>
                    <div class="h4 fw-bold mb-0" th:text="${totalMembers != null ? totalMembers + '명' : '0명'}">0명</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-center">
                    <div class="text-muted small">신규 가입 (오늘)</div>
                    <div class="h4 fw-bold mb-0 text-primary" th:text="${newMembers != null ? newMembers + '명' : '0명'}">0명</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-center">
                    <div class="text-muted small">일시/영구 정지</div>
                    <div class="h4 fw-bold mb-0 text-danger" th:text="${suspendedMembers != null ? suspendedMembers + '명' : '0명'}">0명</div>
                </div>
            </div>
        </div>

        <form th:action="@{/admin/member}" method="get" id="searchForm">
            <input type="hidden" name="page" value="1">
            <div class="filter-bar d-flex align-items-center justify-content-between">
                <div class="d-flex gap-2">
                    <select class="form-select form-select-sm" name="status" style="width: 120px;">
                        <option value="" th:selected="${searchStatus == null or searchStatus == ''}">전체상태</option>
                        <option value="1" th:selected="${searchStatus == '1'}">활동중</option>
                        <option value="0" th:selected="${searchStatus == '0'}">탈퇴/정지</option>
                    </select>
                    <input type="text" class="form-control form-control-sm" name="keyword"
                           th:value="${searchKeyword}" placeholder="이메일 또는 이름 검색" style="width: 200px;"
                           id="keywordInput">
                    <button type="submit" class="btn btn-dark btn-sm">검색</button>
                </div>
                <div class="text-muted small">
                    조회 결과 : <span class="fw-bold" th:text="${searchCount != null ? searchCount : 0}">0</span>명
                </div>
            </div>
        </form>

        <div class="member-table-wrap">
            <table class="table member-table table-hover mb-0">
                <thead>
                    <tr class="text-center">
                        <th>번호</th>
                        <th>계정 정보</th>
                        <th>연락처</th>
                        <th>상태</th>
                        <th>매너온도</th>
                        <th>가입일</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m, stat : ${members}" class="text-center align-middle">
                        <td th:text="${stat.count}">1</td>
                        <td class="text-start">
                            <div class="fw-bold" th:text="${m.email}">email@address.com</div>
                            <small class="text-muted" th:text="${m.userName}">회원명</small>
                        </td>
                        <td th:text="${m.phone}">010-0000-0000</td>
                        <td>
                            <span th:if="${m.status == 0}" class="badge bg-dark">탈퇴</span>
                            <span th:if="${m.status == 1 and m.suspended == 1}" class="badge bg-danger">관리자정지</span>
                            <span th:if="${m.status == 1 and m.idle == 1 and m.suspended == 0}" class="badge bg-secondary">휴면</span>
                            <span th:if="${m.status == 1 and m.suspended == 0 and m.idle == 0}" class="badge bg-success">활동중</span>
                        </td>
                        <td><span class="fw-bold text-primary" th:text="${m.mannerTemp}">50</span>℃</td>
                        <td th:text="${m.regDate}">2026-02-10</td>
                        <td>
                            <button class="btn btn-outline-primary btn-sm"
                                    th:onclick="openMemberModal([[${m.userNo}]])">상세보기</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(members)}">
                        <td colspan="7" class="py-5 text-center text-muted">가입된 회원이 존재하지 않습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav aria-label="Page navigation" class="mt-4">
            <ul class="pagination justify-content-center pagination-sm">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/member(page=${currentPage - 1}, status=${searchStatus}, keyword=${searchKeyword})}">이전</a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/member(page=${i}, status=${searchStatus}, keyword=${searchKeyword})}"
                       th:text="${i}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/member(page=${currentPage + 1}, status=${searchStatus}, keyword=${searchKeyword})}">다음</a>
                </li>
            </ul>
        </nav>
    </main>

    <!-- 회원 상세 모달 -->
    <div class="modal fade" id="memberDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">회원 상세 정보</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- 기본 정보 -->
                    <div class="row mb-3">
                        <div class="col-md-4 text-center border-end">
                            <img id="modalProfileImg" src="https://via.placeholder.com/150"
                                 class="rounded-circle img-thumbnail mb-3"
                                 style="width: 120px; height: 120px; object-fit: cover;">
                            <h5 id="modalNickname" class="fw-bold">닉네임</h5>
                            <p id="modalManner" class="text-primary fw-bold mb-0">50℃</p>
                        </div>
                        <div class="col-md-8">
                            <table class="table table-sm">
                                <tr><th width="30%">이메일</th><td id="modalEmail"></td></tr>
                                <tr><th>이름</th><td id="modalName"></td></tr>
                                <tr><th>연락처</th><td id="modalPhone"></td></tr>
                                <tr><th>가입일</th><td id="modalRegDate"></td></tr>
                                <tr><th>상태</th><td id="modalStatus"></td></tr>
                            </table>
                        </div>
                    </div>

                    <!-- 판매중인 상품 -->
                    <div class="border-top pt-3">
                        <h6 class="fw-bold mb-2">판매중인 상품 <span id="modalProductCount" class="text-muted fw-normal small"></span></h6>
                        <div class="products-section" id="modalProductsWrap">
                            <table class="table table-sm table-bordered mb-0" id="modalProductsTable">
                                <thead class="table-light">
                                    <tr class="text-center">
                                        <th>상품명</th>
                                        <th>카테고리</th>
                                        <th>가격</th>
                                        <th>상태</th>
                                        <th>등록일</th>
                                    </tr>
                                </thead>
                                <tbody id="modalProductsTbody"></tbody>
                            </table>
                            <p id="modalNoProducts" class="text-muted text-center py-2 mb-0" style="display:none;">판매중인 상품이 없습니다.</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-outline-warning" id="btnUnsuspend"
                            style="display:none;" onclick="unsuspendMember()">정지 해제</button>
                    <button type="button" class="btn btn-warning" id="btnSuspend"
                            style="display:none;" onclick="suspendMember()">일시정지</button>
                    <button type="button" class="btn btn-danger" id="btnBan"
                            style="display:none;" onclick="permanentBanMember()">영구정지</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const ctx = /*[[@{/}]]*/ '/';
        let currentUserNo = null;

        // 엔터키 검색
        document.getElementById('keywordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('searchForm').submit();
            }
        });

        function openMemberModal(userNo) {
            if (!userNo) {
                alert("유효하지 않은 회원 번호입니다.");
                return;
            }
            currentUserNo = userNo;

            fetch(`${ctx}admin/member/detail?userNo=${userNo}`)
                .then(response => {
                    if (!response.ok) throw new Error("데이터를 가져오는데 실패했습니다.");
                    return response.json();
                })
                .then(data => {
                    // 프로필
                    document.getElementById('modalProfileImg').src = data.profileImg || 'https://via.placeholder.com/150';
                    document.getElementById('modalNickname').innerText = data.nickname || '-';
                    document.getElementById('modalManner').innerText = (data.mannerTemp || 0) + '℃';

                    // 기본 정보
                    document.getElementById('modalEmail').innerText = data.email || '-';
                    document.getElementById('modalName').innerText = data.userName || '-';
                    document.getElementById('modalPhone').innerText = data.phone || '-';
                    document.getElementById('modalRegDate').innerText = data.regDate || '-';

                    // 상태 뱃지
                    let statusHtml = '';
                    if (data.status == 0) {
                        statusHtml = '<span class="badge bg-dark">탈퇴</span>';
                    } else if (data.suspended == 1) {
                        statusHtml = '<span class="badge bg-danger">관리자정지</span>';
                    } else if (data.idle == 1) {
                        statusHtml = '<span class="badge bg-secondary">휴면</span>';
                    } else {
                        statusHtml = '<span class="badge bg-success">활동중</span>';
                    }
                    document.getElementById('modalStatus').innerHTML = statusHtml;

                    // 버튼 표시 제어
                    const btnSuspend   = document.getElementById('btnSuspend');
                    const btnUnsuspend = document.getElementById('btnUnsuspend');
                    const btnBan       = document.getElementById('btnBan');
                    btnSuspend.style.display   = 'none';
                    btnUnsuspend.style.display = 'none';
                    btnBan.style.display       = 'none';

                    if (data.status == 1 && data.suspended == 0) {
                        // 활동중 → 일시정지 / 영구정지 가능
                        btnSuspend.style.display = 'inline-block';
                        btnBan.style.display     = 'inline-block';
                    } else if (data.status == 1 && data.suspended == 1) {
                        // 이미 정지 → 정지해제 / 영구정지 가능
                        btnUnsuspend.style.display = 'inline-block';
                        btnBan.style.display       = 'inline-block';
                    }
                    // status=0(탈퇴/영구정지)이면 버튼 없음

                    // 판매중인 상품
                    const tbody    = document.getElementById('modalProductsTbody');
                    const noMsg    = document.getElementById('modalNoProducts');
                    const countEl  = document.getElementById('modalProductCount');
                    tbody.innerHTML = '';

                    const products = data.products || [];
                    countEl.innerText = products.length > 0 ? `(${products.length}건)` : '';

                    if (products.length === 0) {
                        noMsg.style.display = 'block';
                        document.getElementById('modalProductsTable').style.display = 'none';
                    } else {
                        noMsg.style.display = 'none';
                        document.getElementById('modalProductsTable').style.display = '';
                        products.forEach(p => {
                            const statusClass = p.tradeStatus === '판매중' ? 'bg-success' :
                                                p.tradeStatus === '예약중' ? 'bg-warning text-dark' : 'bg-secondary';
                            tbody.innerHTML += `
                                <tr class="text-center align-middle">
                                    <td class="text-start">${p.productName || '-'}</td>
                                    <td>${p.categoryName || '-'}</td>
                                    <td>${p.productPrice != null ? p.productPrice.toLocaleString() + '원' : '무료나눔'}</td>
                                    <td><span class="badge ${statusClass} product-badge">${p.tradeStatus || '-'}</span></td>
                                    <td>${p.regDate || '-'}</td>
                                </tr>`;
                        });
                    }

                    const modal = new bootstrap.Modal(document.getElementById('memberDetailModal'));
                    modal.show();
                })
                .catch(error => {
                    console.error(error);
                    alert("정보를 불러오는 중 오류가 발생했습니다.");
                });
        }

        function suspendMember() {
            if (!confirm('이 회원을 일시정지 하시겠습니까?')) return;
            fetch(`${ctx}admin/member/suspend`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `userNo=${currentUserNo}`
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('일시정지 처리되었습니다.');
                    bootstrap.Modal.getInstance(document.getElementById('memberDetailModal')).hide();
                    location.reload();
                } else {
                    alert('처리 중 오류가 발생했습니다.');
                }
            });
        }

        function unsuspendMember() {
            if (!confirm('이 회원의 정지를 해제하시겠습니까?')) return;
            fetch(`${ctx}admin/member/unsuspend`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `userNo=${currentUserNo}`
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('정지가 해제되었습니다.');
                    bootstrap.Modal.getInstance(document.getElementById('memberDetailModal')).hide();
                    location.reload();
                } else {
                    alert('처리 중 오류가 발생했습니다.');
                }
            });
        }

        function permanentBanMember() {
            if (!confirm('이 회원을 영구정지 하시겠습니까?\n이 작업은 되돌리기 어렵습니다.')) return;
            fetch(`${ctx}admin/member/ban`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `userNo=${currentUserNo}`
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('영구정지 처리되었습니다.');
                    bootstrap.Modal.getInstance(document.getElementById('memberDetailModal')).hide();
                    location.reload();
                } else {
                    alert('처리 중 오류가 발생했습니다.');
                }
            });
        }
    </script>
</body>
</html>
