<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>신고 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f0f2f5; }

        /* ── 헤더 ── */
        .detail-header {
            background: linear-gradient(135deg, #1a1f36 0%, #2e3750 100%);
            border-radius: 16px; padding: 24px 28px; color: #fff;
            margin-bottom: 20px; display: flex; align-items: center; gap: 18px;
            box-shadow: 0 6px 24px rgba(30,40,80,.18);
        }
        .report-icon {
            width: 52px; height: 52px; background: rgba(255,255,255,.12);
            border-radius: 14px; display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem; flex-shrink: 0;
        }
        .report-id   { font-size: 0.78rem; opacity: .5; margin-bottom: 3px; }
        .report-type { font-size: 1.15rem; font-weight: 700; margin-bottom: 5px; }
        .report-meta { font-size: 0.78rem; opacity: .6; }
        .header-badge {
            padding: 5px 14px; border-radius: 20px; font-size: 0.78rem;
            font-weight: 700; white-space: nowrap; margin-left: auto; flex-shrink: 0;
        }
        .hb-pending  { background: rgba(231,74,59,.25);  color: #ffadaa; border: 1px solid rgba(231,74,59,.4); }
        .hb-done     { background: rgba(28,200,138,.25); color: #6fffd4; border: 1px solid rgba(28,200,138,.4); }
        .hb-rejected { background: rgba(180,180,200,.2); color: #c0c4d6; border: 1px solid rgba(180,180,200,.3); }

        /* ── 공통 카드 ── */
        .info-card {
            background: #fff; border-radius: 14px; padding: 20px 22px;
            box-shadow: 0 1px 8px rgba(58,59,69,.07); margin-bottom: 16px;
            height: 100%;
        }
        .section-title {
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
            color: #9799b0; letter-spacing: .08em;
            margin-bottom: 14px; padding-bottom: 10px;
            border-bottom: 1px solid #f0f1f8;
            display: flex; align-items: center; gap: 6px;
        }

        /* ── 신고내용 박스 ── */
        .detail-box {
            background: #f7f8fd; border-radius: 10px; padding: 14px 16px;
            font-size: 0.875rem; color: #374151; line-height: 1.85;
            min-height: 90px; border: 1px solid #eef0f8; white-space: pre-wrap;
        }

        /* ── 처리상태 ── */
        .btn-save {
            background: linear-gradient(135deg, #2e3750, #4e73df);
            color: #fff; border: none; border-radius: 10px;
            font-weight: 700; font-size: 0.875rem; transition: opacity .2s;
            width: 100%; padding: 10px;
        }
        .btn-save:hover { opacity: .88; color: #fff; }
        #processResult { font-size: 0.8rem; }

        /* ── 유저 패널 ── */
        .user-card {
            background: #fff; border-radius: 14px;
            box-shadow: 0 1px 8px rgba(58,59,69,.07);
            overflow: hidden; height: 100%;
            display: flex; flex-direction: column;
        }
        .user-card-header {
            padding: 16px 20px 14px;
            border-bottom: 1px solid #f0f1f8;
        }
        .user-card-body { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; }

        .role-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.67rem; font-weight: 800; padding: 3px 10px;
            border-radius: 8px; margin-bottom: 8px;
        }
        .role-reporter { background: #eff6ff; color: #4e73df; }
        .role-target   { background: #fef2f2; color: #e74a3b; }

        .u-name  { font-size: 1rem; font-weight: 700; color: #1e2340; margin-bottom: 2px; }
        .u-email { font-size: 0.78rem; color: #9ca3af; word-break: break-all; }

        .member-chip {
            display: inline-block; padding: 2px 9px;
            border-radius: 8px; font-size: 0.68rem; font-weight: 700; margin-top: 6px;
        }
        .chip-normal  { background: #dcfce7; color: #166534; }
        .chip-suspend { background: #fef9c3; color: #92400e; }
        .chip-ban     { background: #fee2e2; color: #991b1b; }

        /* ── 제재 버튼 영역 ── */
        .sanction-area {
            padding: 12px 0 14px;
            border-bottom: 1px solid #f0f1f8;
            display: flex; gap: 6px; flex-wrap: wrap;
        }
        .sanction-area .btn { font-size: 0.75rem; padding: 5px 11px; border-radius: 8px; }
        .result-msg { font-size: 0.78rem; margin-top: 6px; }

        /* ── 메시지 전송 영역 ── */
        .msg-area { padding-top: 14px; flex: 1; display: flex; flex-direction: column; }
        .msg-area-title {
            font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: .06em; margin-bottom: 10px;
            display: flex; align-items: center; gap: 5px;
        }
        .msg-reporter-title { color: #4e73df; }
        .msg-target-title   { color: #e74a3b; }
        .msg-area .form-control {
            font-size: 0.82rem; border-radius: 8px; border-color: #e5e7eb;
        }
        .msg-area .form-control:focus { border-color: #4e73df; box-shadow: 0 0 0 3px rgba(78,115,223,.1); }
        .btn-send-blue {
            background: #4e73df; color: #fff; border: none;
            border-radius: 8px; font-size: 0.78rem; font-weight: 600;
            padding: 6px 16px; transition: background .15s;
        }
        .btn-send-blue:hover { background: #3a5bc7; color: #fff; }
        .btn-send-red {
            background: #e74a3b; color: #fff; border: none;
            border-radius: 8px; font-size: 0.78rem; font-weight: 600;
            padding: 6px 16px; transition: background .15s;
        }
        .btn-send-red:hover  { background: #c73a2d; color: #fff; }
        .btn-sent { background: #059669 !important; border: none !important; color: #fff !important; border-radius: 8px; font-size: 0.78rem; padding: 6px 16px; }

        /* ── 처리완료 배너 ── */
        .accepted-banner {
            background: linear-gradient(135deg, #ecfdf5, #d1fae5);
            border: 1.5px solid #6ee7b7; border-radius: 12px;
            padding: 12px 18px; display: flex; align-items: center; gap: 12px;
            margin-bottom: 16px;
        }
        .accepted-banner .ab-icon {
            width: 32px; height: 32px; background: #059669; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.9rem; flex-shrink: 0;
        }
        .accepted-banner .ab-title { font-weight: 700; color: #065f46; font-size: 0.85rem; }
        .accepted-banner .ab-sub   { font-size: 0.74rem; color: #047857; }

        /* ── 뒤로가기 ── */
        .btn-back {
            border: 1px solid #d1d5db; color: #374151; background: #fff;
            font-size: 0.82rem; border-radius: 7px; padding: 5px 14px;
            text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-back:hover { background: #f3f4f6; color: #111827; }

        .form-select {
            font-size: 0.875rem; border-radius: 10px; border-color: #e5e7eb;
            font-weight: 600; color: #374151;
        }
        .form-select:focus { border-color: #4e73df; box-shadow: 0 0 0 3px rgba(78,115,223,.1); }
    </style>
</head>
<body class="d-flex">
    <aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>
    <main class="main-content">
        <div class="container-fluid">

            <!-- 상단 네비 -->
            <div class="d-flex align-items-center justify-content-between mb-3">
                <a th:href="@{/admin/complaint}" class="btn-back">
                    <i class="bi bi-chevron-left"></i> 신고 목록으로
                </a>
            </div>

            <!-- 다크 헤더 -->
            <div class="detail-header">
                <div class="report-icon"><i class="bi bi-flag-fill"></i></div>
                <div class="flex-grow-1">
                    <div class="report-id">신고 #<span th:text="${report.reportId}"></span></div>
                    <div class="report-type">
                        <span th:text="${report.mainCategory}"></span>
                        <span class="mx-2" style="opacity:.35;">›</span>
                        <span th:text="${report.typeName}"></span>
                    </div>
                    <div class="report-meta">
                        <i class="bi bi-clock me-1"></i>
                        <span th:text="${#dates.format(report.reportDate, 'yyyy-MM-dd HH:mm')}"></span>
                        <span class="ms-3"><i class="bi bi-person me-1"></i><span th:text="${report.reporterName}"></span></span>
                    </div>
                </div>
                <span class="header-badge"
                      th:classappend="${report.reportStatus == '완료'} ? 'hb-done' : (${report.reportStatus == '처리중'} ? 'hb-pending' : 'hb-pending')"
                      th:text="${report.reportStatus}"></span>
            </div>

            <!-- 처리완료 배너 -->
            <div class="accepted-banner" th:if="${report.reportStatus == '완료'}">
                <div class="ab-icon"><i class="bi bi-check2"></i></div>
                <div>
                    <div class="ab-title">신고가 인정되었습니다</div>
                    <div class="ab-sub">신고자·피신고자에게 처리 결과 알림을 보내주세요.</div>
                </div>
            </div>

            <!-- ① 신고내용 + 처리상태 (상단) -->
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <div class="info-card">
                        <div class="section-title"><i class="bi bi-chat-left-text"></i>신고 내용</div>
                        <div class="detail-box" th:text="${report.reportDetail}">신고 내용이 없습니다.</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="info-card">
                        <div class="section-title"><i class="bi bi-check2-circle"></i>처리 상태 변경</div>
                        <select id="statusSelect" class="form-select mb-3"
                                onchange="onStatusChange(this.value)"
                                th:disabled="${report.reportStatus == '완료'}">
                            <option value="접수"   th:selected="${report.reportStatus == '접수'}">⏳ 접수 — 검토 대기</option>
                            <option value="처리중" th:selected="${report.reportStatus == '처리중'}">🔍 처리중 — 검토 진행</option>
                            <option value="완료"   th:selected="${report.reportStatus == '완료'}">✅ 완료 — 처리 완료</option>
                        </select>
                        <button class="btn-save" onclick="processReport()"
                                th:disabled="${report.reportStatus == '완료'}"
                                th:style="${report.reportStatus == '완료'} ? 'opacity:.45;cursor:not-allowed;' : ''">
                            <i class="bi bi-save me-1"></i>상태 저장 및 알림 자동 작성
                        </button>
                        <div th:if="${report.reportStatus == '완료'}" class="mt-2 small text-success">
                            <i class="bi bi-lock-fill me-1"></i>처리 완료된 신고는 상태를 변경할 수 없습니다.
                        </div>
                        <div id="processResult" class="mt-2 d-none"></div>
                    </div>
                </div>
            </div>

            <!-- ② 신고자 + 피신고자 (하단, 좌우) -->
            <div class="row g-3">

                <!-- 신고자 (왼쪽) -->
                <div class="col-md-6 d-flex flex-column">
                    <div class="user-card">
                        <div class="user-card-header">
                            <div class="role-badge role-reporter"><i class="bi bi-person me-1"></i>신고자</div>
                            <div class="u-name" th:text="${report.reporterName != null ? report.reporterName : '알 수 없음'}"></div>
                            <div class="u-email" th:text="${report.reporterEmail}"></div>
                            <span th:if="${report.reporterStatus == 0}" class="member-chip chip-ban">영구정지</span>
                            <span th:if="${report.reporterStatus != 0 and report.reporterSuspended == 1}" class="member-chip chip-suspend">일시정지 중</span>
                            <span th:if="${report.reporterStatus != 0 and report.reporterSuspended == 0}" class="member-chip chip-normal">정상</span>
                        </div>
                        <div class="user-card-body">
                            <!-- 제재 버튼 -->
                            <div class="sanction-area">
                                <button class="btn btn-warning btn-sm" id="btnReporterSuspend"
                                        onclick="doSuspend('reporter','suspend')">
                                    <i class="bi bi-pause-circle me-1"></i>일시정지
                                </button>
                                <button class="btn btn-danger btn-sm" id="btnReporterBan"
                                        onclick="doSuspend('reporter','ban')">
                                    <i class="bi bi-x-circle me-1"></i>영구차단
                                </button>
                                <button class="btn btn-outline-secondary btn-sm" id="btnReporterRelease"
                                        disabled onclick="doRelease('reporter','reporterResult')">
                                    <i class="bi bi-arrow-counterclockwise me-1"></i>해지하기
                                </button>
                            </div>
                            <div id="reporterResult" class="result-msg d-none"></div>

                            <!-- 메시지 전송 -->
                            <div class="msg-area">
                                <div class="msg-area-title msg-reporter-title">
                                    <i class="bi bi-envelope"></i>신고자에게 알림 전송
                                </div>
                                <input type="text" id="r1Title" class="form-control form-control-sm mb-2"
                                       placeholder="제목" value="신고 접수 안내">
                                <textarea id="r1Msg" class="form-control form-control-sm mb-2" rows="4"
                                          placeholder="신고자에게 보낼 내용을 입력하세요."></textarea>
                                <div class="text-end">
                                    <button class="btn-send-blue" id="btnR1"
                                            th:attr="data-email=${report.reporterEmail}"
                                            onclick="sendNotify('r1')">
                                        <i class="bi bi-send me-1"></i>전송
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 피신고자 (오른쪽) -->
                <div class="col-md-6 d-flex flex-column">
                    <div class="user-card">
                        <div class="user-card-header">
                            <div class="role-badge role-target"><i class="bi bi-person-x me-1"></i>피신고자</div>
                            <div class="u-name" th:text="${report.targetName != null ? report.targetName : '알 수 없음'}"></div>
                            <div class="u-email" th:text="${report.targetEmail}"></div>
                            <span th:if="${report.targetStatus == 0}" class="member-chip chip-ban">영구정지</span>
                            <span th:if="${report.targetStatus != 0 and report.targetSuspended == 1}" class="member-chip chip-suspend">일시정지 중</span>
                            <span th:if="${report.targetStatus != 0 and report.targetSuspended == 0}" class="member-chip chip-normal">정상</span>
                        </div>
                        <div class="user-card-body">
                            <!-- 제재 버튼 -->
                            <div class="sanction-area">
                                <button class="btn btn-warning btn-sm" id="btnTargetSuspend"
                                        th:disabled="${report.targetStatus == 0 or report.targetSuspended == 1}"
                                        onclick="doSuspend('target','suspend')">
                                    <i class="bi bi-pause-circle me-1"></i>일시정지
                                </button>
                                <button class="btn btn-danger btn-sm" id="btnTargetBan"
                                        th:disabled="${report.targetStatus == 0}"
                                        onclick="doSuspend('target','ban')">
                                    <i class="bi bi-x-circle me-1"></i>영구차단
                                </button>
                                <button class="btn btn-outline-secondary btn-sm" id="btnTargetRelease"
                                        th:disabled="${report.targetStatus != 0 and report.targetSuspended == 0}"
                                        onclick="doRelease('target','targetResult')">
                                    <i class="bi bi-arrow-counterclockwise me-1"></i>해지하기
                                </button>
                            </div>
                            <div id="targetResult" class="result-msg d-none"></div>

                            <!-- 메시지 전송 -->
                            <div class="msg-area">
                                <div class="msg-area-title msg-target-title">
                                    <i class="bi bi-envelope"></i>피신고자에게 알림 전송
                                </div>
                                <input type="text" id="r2Title" class="form-control form-control-sm mb-2"
                                       placeholder="제목" value="신고 처리 안내">
                                <textarea id="r2Msg" class="form-control form-control-sm mb-2" rows="4"
                                          placeholder="피신고자에게 보낼 내용을 입력하세요."></textarea>
                                <div class="text-end">
                                    <button class="btn-send-red" id="btnR2"
                                            th:attr="data-email=${report.targetEmail}"
                                            onclick="sendNotify('r2')">
                                        <i class="bi bi-send me-1"></i>전송
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const _ctx           = /*[[@{/}]]*/ '/';
        const BASE           = _ctx.replace(/\/$/, '');
        const REPORT_ID      = /*[[${report.reportId}]]*/ 0;
        const TARGET_USERNO  = /*[[${report.targetUserNo}]]*/ 0;
        const REPORTER_USERNO= /*[[${report.reporterUserNo}]]*/ 0;
        const TARGET_EMAIL   = /*[[${report.targetEmail}]]*/ '';
        const REPORTER_EMAIL = /*[[${report.reporterEmail}]]*/ '';
        const REPORTER_NAME  = /*[[${report.reporterName}]]*/ '';
        const TARGET_NAME    = /*[[${report.targetName}]]*/ '';
        const REPORT_TYPE    = /*[[${report.typeName}]]*/ '';
        /*]]>*/

        function onStatusChange(status) {
            if (status === '완료') {
                document.getElementById('r1Title').value = '[처리완료] 신고 인정 안내';
                document.getElementById('r1Msg').value =
                    REPORTER_NAME + '님 안녕하세요.\n\n접수하신 신고(' + REPORT_TYPE + ')가 검토 결과 인정되었습니다.\n관련 조치가 처리되었으며, 더 안전한 서비스를 위해 최선을 다하겠습니다.\n\n감사합니다.\n관리자 드림';
                document.getElementById('r2Title').value = '[처리완료] 신고 처리 결과 안내';
                document.getElementById('r2Msg').value =
                    TARGET_NAME + '님 안녕하세요.\n\n귀하에 대한 신고(' + REPORT_TYPE + ')가 접수되어 검토한 결과,\n해당 신고 내용이 인정되어 조치가 이루어졌음을 안내드립니다.\n이의가 있으시면 고객센터로 문의해 주세요.\n\n관리자 드림';
            } else {
                document.getElementById('r1Title').value = '신고 접수 안내';
                document.getElementById('r1Msg').value = '';
                document.getElementById('r2Title').value = '신고 처리 안내';
                document.getElementById('r2Msg').value = '';
            }
        }

        // 메시지 전송 여부 추적
        let sentR1 = false;
        let sentR2 = false;

        function processReport() {
            const status = document.getElementById('statusSelect').value;
            const el = document.getElementById('processResult');

            // 상태별 메시지 전송 필수 검증
            if (status === '완료') {
                if (!sentR1 || !sentR2) {
                    el.classList.remove('d-none');
                    el.className = 'mt-2 small text-danger';
                    el.textContent = '✗ 완료 처리 시 신고자·피신고자 모두에게 알림을 전송해야 합니다.';
                    return;
                }
            }

            fetch(BASE + '/admin/complaint/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'reportId=' + REPORT_ID + '&status=' + encodeURIComponent(status)
            })
            .then(r => r.json())
            .then(data => {
                el.classList.remove('d-none');
                if (data.success) {
                    el.className = 'mt-2 small text-success';
                    el.textContent = '✓ 상태가 저장되었습니다.';
                    onStatusChange(status);
                } else {
                    el.className = 'mt-2 small text-danger';
                    el.textContent = '✗ 저장 실패: ' + (data.message || '알 수 없는 오류');
                }
            });
        }

        function doSuspend(who, type) {
            const userNo   = who === 'reporter' ? REPORTER_USERNO : TARGET_USERNO;
            const email    = who === 'reporter' ? REPORTER_EMAIL  : TARGET_EMAIL;
            const label    = type === 'suspend' ? '일시정지' : '영구차단';
            const resultId = who + 'Result';
            if (!confirm('[' + label + '] 적용하시겠습니까?')) return;
            fetch(BASE + (type === 'suspend' ? '/admin/member/suspend' : '/admin/member/ban'), {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'userNo=' + userNo + '&email=' + encodeURIComponent(email)
            })
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById(resultId);
                el.classList.remove('d-none');
                el.className = 'result-msg ' + (data.success ? 'text-success' : 'text-danger');
                el.textContent = data.success
                    ? '✓ ' + label + ' 적용되었습니다.'
                    : '✗ 실패: ' + (data.message || '오류');
                if (data.success) {
                    // 해지하기 버튼 활성화
                    const prefix = who === 'reporter' ? 'Reporter' : 'Target';
                    const releaseBtn = document.getElementById('btn' + prefix + 'Release');
                    if (releaseBtn) releaseBtn.disabled = false;
                }
            });
        }

        function doRelease(who, resultId) {
            const userNo = who === 'reporter' ? REPORTER_USERNO : TARGET_USERNO;
            if (!confirm('제재를 해지하시겠습니까?')) return;
            fetch(BASE + '/admin/complaint/memberAction', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'userNo=' + userNo + '&action=unsuspend'
            })
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById(resultId);
                el.classList.remove('d-none');
                el.className = 'result-msg ' + (data.success ? 'text-success' : 'text-danger');
                el.textContent = data.success ? '✓ 제재가 해지되었습니다.' : '✗ 실패: ' + (data.error || '오류');
                if (data.success) {
                    const prefix = who === 'reporter' ? 'Reporter' : 'Target';
                    const releaseBtn = document.getElementById('btn' + prefix + 'Release');
                    if (releaseBtn) releaseBtn.disabled = true;
                }
            });
        }

        function sendNotify(key) {
            const btn     = document.getElementById('btn' + key.toUpperCase());
            const email   = btn.dataset.email;
            const title   = document.getElementById(key + 'Title').value.trim();
            const message = document.getElementById(key + 'Msg').value.trim();
            if (!title)   { alert('제목을 입력하세요.'); return; }
            if (!message) { alert('내용을 입력하세요.'); return; }
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>전송 중...';
            fetch(BASE + '/admin/complaint/notify', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'email=' + encodeURIComponent(email)
                    + '&title=' + encodeURIComponent(title)
                    + '&message=' + encodeURIComponent(message)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    btn.className = 'btn-sent';
                    btn.innerHTML = '<i class="bi bi-check2 me-1"></i>전송완료';
                    // 전송 완료 표시
                    if (key === 'r1') sentR1 = true;
                    if (key === 'r2') sentR2 = true;
                } else {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-send me-1"></i>전송';
                    alert('전송 실패: ' + (data.message || '오류'));
                }
            })
            .catch(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send me-1"></i>전송';
                alert('네트워크 오류');
            });
        }
    </script>
</body>
</html>
