<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="adModal">

<div class="modal fade" id="adDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

            <!-- 헤더 -->
            <div class="modal-header border-0 px-4 pt-4 pb-2" style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);">
                <div>
                    <h5 class="modal-title fw-bold text-white mb-1">
                        <i class="bi bi-megaphone-fill me-2 text-warning"></i>광고 신청 상세
                    </h5>
                    <span id="adStatusBadge" class="badge fs-6 px-3 py-1"></span>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body p-0">
                <div class="row g-0">

                    <!-- 좌측: 광고 정보 -->
                    <div class="col-lg-7 p-4 border-end">
                        <h6 class="fw-bold text-muted text-uppercase small mb-3 letter-spacing">
                            <i class="bi bi-file-text me-1"></i> 신청 정보
                        </h6>

                        <div class="info-grid mb-4">
                            <div class="info-row">
                                <span class="info-label">업체명</span>
                                <span class="info-value fw-bold" id="brandName"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">담당자</span>
                                <span class="info-value" id="managerName"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">연락처</span>
                                <span class="info-value" id="phone"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">이메일</span>
                                <span class="info-value text-primary" id="companyEmail"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">광고 기간</span>
                                <span class="info-value fw-bold text-danger" id="period"></span>
                                <small class="text-muted ms-1">(<span id="durationWeeks"></span>주)</small>
                            </div>
                            <div class="info-row">
                                <span class="info-label">결제 금액</span>
                                <span class="info-value fw-bold text-success fs-5" id="amount"></span>
                                <small class="text-muted ms-1">원</small>
                            </div>
                        </div>

                        <hr class="my-3">

                        <div class="mb-3">
                            <h6 class="fw-bold small text-muted mb-2">광고 문구 / 상세 내용</h6>
                            <div id="content" class="p-3 rounded-3 border bg-light small" style="min-height:80px; white-space:pre-wrap; line-height:1.7;"></div>
                        </div>

                        <!-- 이미지 -->
                        <div id="imageSection">
                            <h6 class="fw-bold small text-muted mb-2">첨부 배너 이미지</h6>
                            <div class="text-center p-3 rounded-3 border bg-light">
                                <img id="adImage" class="img-fluid rounded-3 shadow-sm mb-2"
                                     style="max-height:220px; cursor:zoom-in; display:none;"
                                     onclick="window.open(this.src)"
                                     onerror="this.style.display='none'; document.getElementById('noImageText').style.display=''">
                                <p id="noImageText" class="text-muted small mb-0" style="display:none;">이미지 없음</p>
                                <div class="mt-2">
                                    <a id="downloadBtn" class="btn btn-outline-secondary btn-sm" style="display:none;">
                                        <i class="bi bi-download me-1"></i>원본 다운로드
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 우측: 처리 -->
                    <div class="col-lg-5 p-4 bg-light">

                        <!-- 확정/반려 상태 표시 (CONFIRM or REJECT) -->
                        <div id="statusCompleted" class="d-none mb-3 p-4 rounded-4 text-center shadow-sm">
                            <div id="statusIcon" class="mb-2" style="font-size:2.5rem;"></div>
                            <h5 class="fw-bold mb-1" id="statusText"></h5>
                            <small class="text-muted" id="processedAtText"></small>
                        </div>
                        <!-- 조기 철회 (CONFIRM 상태일 때만 표시) -->
                        <div id="withdrawArea" class="d-none mb-3">
                            <div class="card border-warning border-2 rounded-4 shadow-sm">
                                <div class="card-body p-3">
                                    <h6 class="fw-bold text-warning mb-2">
                                        <i class="bi bi-exclamation-triangle-fill me-1"></i> 조기 철회
                                    </h6>
                                    <div class="mb-2">
                                        <label class="form-label small text-muted mb-1">철회 사유 <span class="text-danger">*</span></label>
                                        <textarea id="withdrawReason" class="form-control form-control-sm" rows="3" placeholder="철회 사유를 입력하세요."></textarea>
                                    </div>
                                    <button class="btn btn-warning btn-sm w-100 fw-bold" onclick="withdrawAd()">
                                        <i class="bi bi-stop-circle me-1"></i>광고 조기 철회
                                    </button>
                                </div>
                            </div>
                        </div>
                        <!-- 반려 사유 박스 -->
                        <div id="rejectReasonBox" class="d-none mb-3 p-3 rounded-3 border border-danger bg-white">
                            <div class="fw-bold small text-danger mb-1"><i class="bi bi-x-circle-fill me-1"></i>반려 사유</div>
                            <div id="rejectReasonText" class="small text-secondary" style="white-space:pre-wrap;"></div>
                        </div>

                        <!-- 처리 영역 (WAIT) -->
                        <div id="actionArea">
                            <div id="conflictMessage" class="alert alert-warning py-2 small d-none mb-3">
                                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                            </div>

                            <div class="card border-0 shadow-sm rounded-4 mb-3">
                                <div class="card-body p-4">
                                    <h6 class="fw-bold mb-3">
                                        <i class="bi bi-envelope-paper text-primary me-1"></i> 피드백 메일 발송
                                    </h6>
                                    <div class="mb-3">
                                        <label class="form-label small text-muted mb-1">수신 이메일</label>
                                        <input type="text" id="targetEmail" class="form-control form-control-sm bg-white" readonly>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small text-muted mb-1">메일 제목</label>
                                        <input id="mailTitle" class="form-control form-control-sm" placeholder="제목 입력">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small text-muted mb-1">메일 내용 <span class="text-danger">(반려 시 사유 필수)</span></label>
                                        <textarea id="mailContent" class="form-control form-control-sm" rows="5" placeholder="내용을 입력하세요."></textarea>
                                    </div>
                                    <div class="d-flex gap-2 justify-content-end">
                                        <button class="btn btn-sm btn-outline-danger" onclick="setRejectTemplate()">
                                            <i class="bi bi-x-circle me-1"></i>반려 양식
                                        </button>
                                        <button class="btn btn-sm btn-outline-primary" onclick="setApproveTemplate()">
                                            <i class="bi bi-check-circle me-1"></i>승인 양식
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-2">
                                <div class="col-6">
                                    <button class="btn btn-danger w-100 fw-bold rounded-3" onclick="rejectAd()">
                                        <i class="bi bi-x-lg me-1"></i>최종 반려
                                    </button>
                                </div>
                                <div class="col-6">
                                    <button id="approveBtn" class="btn btn-primary w-100 fw-bold rounded-3" onclick="approveAd()">
                                        <i class="bi bi-check-lg me-1"></i>최종 승인
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.info-grid { display: flex; flex-direction: column; gap: 10px; }
.info-row  { display: flex; align-items: baseline; gap: 8px; padding: 8px 12px; background: #f8f9fc; border-radius: 8px; }
.info-label { min-width: 80px; font-size: .78rem; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; flex-shrink: 0; }
.info-value { font-size: .92rem; color: #2e3750; }
</style>

</th:block>
</body>
</html>
