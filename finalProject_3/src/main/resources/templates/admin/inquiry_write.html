<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::head}, ~{::main}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="ko">
<head>
    <style>
        .inquiry-container { max-width: 800px; margin: 50px auto; }
        .form-label { font-weight: bold; }
        .btn-submit { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>

<main>
    <div class="container inquiry-container">
        <h2 class="mb-4">✉️ 1:1 문의 작성</h2>
        <hr>

        <form th:action="@{/admin/inquiry/save}" method="post">
            <div class="mb-3">
                <label for="title" class="form-label">제목</label>
                <input type="text" class="form-control" id="title" name="title" placeholder="제목을 입력해주세요" required>
            </div>

            <div class="mb-3">
                <label for="memberEmail" class="form-label">이메일</label>
                <input type="email" class="form-control" id="memberEmail" name="memberEmail" 
                       th:value="${session.loginuser != null ? session.loginuser.email : ''}" 
                       placeholder="example@email.com" required readonly>
            </div>

            <div class="mb-3">
                <label for="content" class="form-label">내용</label>
                <textarea class="form-control" id="content" name="content" rows="10" placeholder="문의 내용을 상세히 적어주세요" required></textarea>
            </div>

            <div class="mb-4">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="isPrivate" name="isPrivate" value="Y">
                    <label class="form-check-label" for="isPrivate">비밀글로 문의하기</label>
                </div>
                <small class="text-muted">* 비밀글은 관리자와 작성자만 볼 수 있습니다.</small>
            </div>

            <div class="d-flex justify-content-center gap-3 mb-5">
                <button type="button" class="btn btn-secondary" onclick="history.back()">취소</button>
                <button type="submit" class="btn btn-submit px-5">등록하기</button>
            </div>
        </form>
    </div>
</main>

<script>
    // 필요한 자바스크립트가 있다면 여기에 작성 (없어도 빈 태그는 유지)
    $(document).ready(function() {
        console.log("문의 작성 페이지 로드 완료");
    });
</script>

</body>
</html>
