<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 상품 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .main-content { padding: 30px; background-color: #f8f9fa; min-height: 100vh; width: 100%; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; padding: 20px; }
        .chart-wrapper { position: relative; width: 100%; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .onsale { background-color: #e6fcf5; color: #0ca678; }
        .reserve { background-color: #fff4e6; color: #f76707; }
        .soldout { background-color: #f1f3f5; color: #868e96; }
        .table { background: white; border-radius: 10px; overflow: hidden; }
        .table thead { background-color: #f1f3f5; }
        .bg-light-warning { background-color: #fffcf0; }
        .bg-light-danger { background-color: #fff5f5; }
    </style>
</head>
<body class="d-flex">

    <aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>

    <main class="main-content">
        <h4 class="mb-4 fw-bold">📦 상품 관리 대시보드</h4>

        <div class="row g-3 mb-4">
            <div class="col-md-5">
                <div class="card h-100">
                    <div class="fw-bold mb-3 small">📈 일별 상품 등록 현황</div>
                    <div class="chart-wrapper" style="height: 220px;">
                        <canvas id="productChart"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="card h-100 text-center">
                    <div class="fw-bold mb-3 small text-start">🏷️ 카테고리별 비중</div>
                    <div class="chart-wrapper" style="height: 220px;">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="d-flex flex-column gap-2 h-100">
                    <div class="card flex-fill py-2 text-center bg-white border-0">
                        <div class="text-muted small">총 등록 상품</div>
                        <div class="h5 fw-bold mb-0" th:text="${totalProducts + '건'}">0건</div>
                    </div>
                    <div class="card flex-fill py-2 text-center border-warning-subtle bg-light-warning">
                        <div class="text-muted small">금지어 의심</div>
                        <div class="h5 fw-bold mb-0 text-warning" 
                             th:text="${#lists.toList(productList).?[suspect == true].size() + '건'}">0건</div>
                    </div>
                    <div class="card flex-fill py-2 text-center border-danger-subtle bg-light-danger">
                        <div class="text-muted small">신고된 상품</div>
                        <div class="h5 fw-bold mb-0 text-danger" th:text="${reportCount + '건'}">0건</div>
                    </div>
                    <div class="card flex-fill py-2 text-center border-0 bg-white text-success">
                        <div class="text-muted small">현재 판매중</div>
                        <div class="h5 fw-bold mb-0" th:text="${onsaleCount + '건'}">0건</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card py-3 mb-3">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex gap-2">
                    <select class="form-select form-select-sm" style="width: 120px;">
                        <option value="">전체상태</option>
                        <option value="판매중">판매중</option>
                        <option value="예약중">예약중</option>
                        <option value="판매완료">판매완료</option>
                    </select>
                    <input type="text" class="form-control form-control-sm" placeholder="상품명 또는 판매자 검색" style="width: 250px;">
                    <button class="btn btn-dark btn-sm">검색</button>
                </div>
                <div class="text-muted small">
                    조회 결과 : <span class="fw-bold" th:text="${#lists.size(productList)}">0</span>개
                </div>
            </div>
        </div>

        <div class="card p-0 overflow-hidden">
            <table class="table table-hover mb-0 text-center align-middle">
                <thead>
                    <tr>
                        <th style="width: 80px;">번호</th>
                        <th>판매자</th>
                        <th class="text-start">상품명</th>
                        <th>카테고리</th>
                        <th>판매가격</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(productList)}">
                        <td colspan="7" class="py-5 text-muted">등록된 상품이 없습니다.</td>
                    </tr>
                    <tr th:each="product, stat : ${productList}" th:classappend="${product.suspect ? 'table-warning-subtle' : ''}">
                        <td th:text="${(currentPage - 1) * size + stat.count}">1</td>
                        <td><small th:text="${product.sellerEmail}">email@domain.com</small></td>
                        <td class="text-start fw-bold">
                            <span th:text="${product.productName}">상품명</span>
                            <span th:if="${product.suspect}" class="badge bg-danger ms-1" 
                                  style="font-size: 0.7rem; vertical-align: middle;">⚠️ 의심</span>
                        </td>
                        <td><small class="text-muted" th:text="${product.categoryName}">카테고리</small></td>
                        <td th:text="${product.productPrice > 0 ? #numbers.formatInteger(product.productPrice, 0, 'COMMA') + '원' : '나눔'}">0원</td>
                        <td>
                            <span class="status-badge" 
                                  th:classappend="${product.tradeStatus == '예약중' ? 'reserve' : (product.tradeStatus == '판매완료' ? 'soldout' : 'onsale')}"
                                  th:text="${product.tradeStatus}">판매중</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/productDetail(productNo=${product.productNo})}" 
                               class="btn btn-outline-secondary btn-sm">상세보기</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${totalPages > 0}" class="mt-4">
            <ul class="pagination justify-content-center pagination-sm">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/product(page=${currentPage - 1}, size=${size})}">이전</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/product(page=${i}, size=${size})}" th:text="${i}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/product(page=${currentPage + 1}, size=${size})}">다음</a>
                </li>
            </ul>
        </nav>
    </main>

    <script th:inline="javascript">
        // 1. 일별 등록 현황 (라인 차트)
        const ctx = document.getElementById('productChart').getContext('2d');
        const chartData = /*[[${chartData}]]*/ [5, 10, 8, 15, 20, 12, 7]; // 샘플 데이터
        
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['월', '화', '수', '목', '금', '토', '일'],
                datasets: [{
                    label: '등록 건수',
                    data: chartData,
                    borderColor: '#495057',
                    backgroundColor: 'rgba(73, 80, 87, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });

        // 2. 카테고리별 비중 (도넛 차트)
        const catCtx = document.getElementById('categoryChart').getContext('2d');
        new Chart(catCtx, {
            type: 'doughnut',
            data: {
                labels: ['패션', '가전', '육아', '취미', '기타'],
                datasets: [{
                    data: [30, 20, 15, 10, 25], // 샘플 데이터
                    backgroundColor: ['#ff6b6b', '#4dabf7', '#ffd43b', '#63e6be', '#be4bdb'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } }
                },
                cutout: '70%'
            }
        });
    </script>
</body>
</html>
