<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<title>콘텐츠 관리</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body { background:#f8f9fc; font-family:Pretendard; }
    .main-content { flex:1; padding:25px; }
    .dashboard-card { background:white; border-radius:12px; box-shadow:0 0.15rem 1.75rem rgba(58,59,69,0.1); padding:20px; margin-bottom:24px; }
    .calendar-table { width:100%; border-collapse:collapse; table-layout:fixed; }
    .calendar-table th { text-align:center; padding:10px; font-size:12px; font-weight:600; background:#f8f9fc; }
    .calendar-table td { border:1px solid #eee; height:90px; vertical-align:top; padding:6px; background:#fff; }
    .calendar-table th:nth-child(6), .calendar-table th:nth-child(7) { color:#e74a3b; }
    .day-num { font-size:12px; font-weight:700; margin-bottom:4px; color:#333; }
    .ad-tag { font-size:11px; padding:3px 6px; border-radius:6px; color:white; margin-top:3px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; transition:all 0.15s ease; font-weight:500; }
    .ad-tag:hover { transform:scale(1.03); opacity:0.9; }
    .status-confirm { color:#1cc88a; font-weight:700; }
    .status-wait { color:#f6c23e; font-weight:700; }
    .status-reject { color:#e74a3b; font-weight:700; }
    .brand-name { font-weight:600; font-size:14px; }
    .amount { font-weight:600; color:#4e73df; }
</style>
</head>

<body class="d-flex">

<aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>

<main class="main-content">
    <div class="container-fluid">
        <h4 class="fw-bold mb-4">광고 콘텐츠 관리</h4>

        <div class="row">
            <div class="col-lg-7">
                <div class="dashboard-card">
                    <div class="d-flex justify-content-between mb-3">
                        <b id="waitingText">대기중 광고 0건 있습니다</b>
                        <select id="chartType" class="form-select form-select-sm w-auto">
                            <option>매출</option>
                            <option>문의</option>
                        </select>
                    </div>
                    <div style="height:250px">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>

                <div class="dashboard-card">
                    <h6 class="fw-bold mb-3">진행중 광고</h6>
                    <ul class="list-group list-group-flush" id="runningList"></ul>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="dashboard-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <button class="btn btn-sm btn-outline-secondary" onclick="moveMonth(-1)">
                            <i class="bi bi-chevron-left"></i>
                        </button>
                        <b th:text="${year} + '년 ' + ${month} + '월'"></b>
                        <button class="btn btn-sm btn-outline-secondary" onclick="moveMonth(1)">
                            <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>

                    <table class="calendar-table">
                        <thead>
                            <tr>
                                <th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th><th>SUN</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="week : ${calendarWeeks}">
                                <td th:each="day : ${week}">
                                    <div class="day-num" th:if="${day != null}" th:text="${#temporals.day(day)}"></div>
                                    <div th:each="ad : ${adList}"
                                         th:if="${day != null and ad.status == 'CONFIRM' and day >= ad.startDate and day <= ad.endDate}">
                                        <span class="ad-tag bg-success" th:text="${ad.brandName}"></span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="dashboard-card">
            <h5 class="fw-bold mb-3">광고 리스트</h5>
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>브랜드</th><th>담당자</th><th>이메일</th><th>금액</th><th>상태</th><th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ad : ${adList}">
                        <td class="brand-name" th:text="${ad.brandName}"></td>
                        <td th:text="${ad.managerName}"></td>
                        <td th:text="${ad.companyEmail}"></td>
                        <td class="amount" th:text="${#numbers.formatInteger(ad.amount, 3, 'COMMA')} + '원'"></td>
                        <td>
                            <span th:if="${ad.status == 'CONFIRM'}" class="status-confirm">CONFIRM</span>
                            <span th:if="${ad.status == 'WAIT'}" class="status-wait">WAIT</span>
                            <span th:if="${ad.status == 'REJECT'}" class="status-reject">REJECT</span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-dark" data-bs-toggle="modal" data-bs-target="#adDetailModal" th:attr="data-adid=${ad.adId}">
                                상세보기
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{admin/fragments/ad_modal :: adModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const ctx = /*[[@{/}]]*/ "";
    let ads = /*[[${adList}]]*/ [];
    let year = /*[[${year}]]*/ 0;
    let month = /*[[${month}]]*/ 0;
    let selectedAdId = null;

    // 월 이동 함수
    function moveMonth(diff){
        month += diff;
        if(month < 1){ month = 12; year--; }
        if(month > 12){ month = 1; year++; }
        location.href = ctx + "admin/contents?year=" + year + "&month=" + month;
    }

    // 초기 세팅
    document.addEventListener("DOMContentLoaded", function(){
        // 대기 광고 건수 표시
        let waiting = ads.filter(a => a.status === 'WAIT').length;
        document.getElementById("waitingText").innerText = "대기중 광고 " + waiting + "건 있습니다";

        // 진행중 리스트 렌더링
        const runningList = document.getElementById("runningList");
        runningList.innerHTML = ads.filter(a => a.status === 'CONFIRM').map(ad => `
            <li class="list-group-item">
                <b>${ad.brandName}</b><br>
                <small>${ad.startDate} ~ ${ad.endDate}</small>
            </li>
        `).join("");

        // 상세보기 이벤트 리스너
        document.querySelectorAll("[data-adid]").forEach(btn => {
            btn.addEventListener("click", function(){
                selectedAdId = this.dataset.adid;
                
                fetch(ctx + "admin/ad/detail?adId=" + selectedAdId)
                .then(res => res.json())
                .then(data => {
                    if(!data.ad) return;
                    const ad = data.ad;

                    // 기본 정보 매핑
                    document.getElementById("brandName").innerText = ad.brandName;
                    document.getElementById("managerName").innerText = ad.managerName;
                    document.getElementById("phone").innerText = ad.phone;
                    document.getElementById("content").innerText = ad.content;
                    document.getElementById("period").innerText = ad.startDate + " ~ " + ad.endDate;

                    // 중요: 광고 이미지 및 다운로드 경로 처리
                    const adImage = document.getElementById("adImage");
                    const downloadBtn = document.getElementById("downloadBtn");

                    if(ad.filePath) {
                        let imgPath = ctx + "upload/" + ad.filePath;
                        if(adImage) { adImage.src = imgPath; adImage.style.display = "block"; }
                        if(downloadBtn) downloadBtn.href = ctx + "admin/ad/download?adId=" + selectedAdId;
                    } else {
                        if(adImage) { adImage.src = ""; adImage.style.display = "none"; }
                        if(downloadBtn) downloadBtn.href = "#";
                    }

                    // 충돌 메시지 처리
                    let conflictBox = document.getElementById("conflictMessage");
                    if(data.conflictAds && data.conflictAds.length > 0){
                        let names = data.conflictAds.map(a => a.brandName).join(", ");
                        conflictBox.innerText = "⚠ " + names + " 광고와 기간이 충돌합니다.";
                    } else {
                        conflictBox.innerText = "";
                    }
                });
            });
        });

        // 차트 초기화
        const chartCtx = document.getElementById("mainChart");
        new Chart(chartCtx, {
            type:'line',
            data:{
                labels:['10월','11월','12월','1월','2월','3월'],
                datasets:[{
                    data:[30,55,40,70,85,60],
                    borderColor:'#4e73df',
                    backgroundColor:'rgba(78,115,223,0.05)',
                    fill:true,
                    tension:0.4
                }]
            },
            options:{ maintainAspectRatio:false }
        });
    });

    // 승인/반려 함수 (기존과 동일)
    function approveAd(){
        if(!selectedAdId) return alert("광고 선택 안됨");
        fetch(ctx + "admin/ad/approve", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "adId=" + selectedAdId
        }).then(() => { alert("광고 승인 완료"); location.reload(); });
    }

    function rejectAd(){
        if(!selectedAdId) return alert("광고 선택 안됨");
        let reason = document.getElementById("mailContent").value;
        fetch(ctx + "admin/ad/reject", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "adId=" + selectedAdId + "&reason=" + encodeURIComponent(reason)
        }).then(() => { alert("광고 반려 완료"); location.reload(); });
    }
</script>
</body>
</html>
