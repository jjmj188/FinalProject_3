<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<title>콘텐츠 관리</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root { --primary:#4e73df; --success:#1cc88a; --warning:#f6c23e; --danger:#e74a3b; }

    .stat-card {
        background:#fff; border-radius:16px; padding:22px 24px;
        border-left:5px solid; box-shadow:0 2px 12px rgba(0,0,0,.07);
        transition:transform .2s;
    }
    .stat-card:hover { transform:translateY(-3px); }
    .stat-card.blue   { border-color:var(--primary); }
    .stat-card.green  { border-color:var(--success); }
    .stat-card.yellow { border-color:var(--warning); }
    .stat-card.red    { border-color:var(--danger);  }
    .stat-label { font-size:11px; font-weight:700; text-transform:uppercase; color:#858796; letter-spacing:.06em; }
    .stat-value { font-size:2rem; font-weight:800; color:#2e3750; line-height:1.1; }
    .stat-icon  { font-size:2rem; opacity:.15; }

    .section-card {
        background:#fff; border-radius:16px;
        box-shadow:0 2px 12px rgba(0,0,0,.07); overflow:hidden;
    }
    .section-header {
        padding:18px 22px; border-bottom:1px solid #f1f4f8;
        display:flex; align-items:center; justify-content:space-between;
    }
    .section-header h6 { margin:0; font-weight:700; color:#2e3750; font-size:.95rem; }
    .section-body { padding:20px 22px; }

    /* 캘린더 */
    .cal-wrap { overflow:visible; }
    .calendar-table { width:100%; border-collapse:collapse; table-layout:fixed; }
    .calendar-table th {
        text-align:center; padding:10px 4px; font-size:11px;
        font-weight:700; background:linear-gradient(135deg,#f8f9fc,#eef0f8);
        color:#6c757d; border-bottom:2px solid #e3e6f0; letter-spacing:.04em;
    }
    .calendar-table td {
        border:1px solid #eef0f6; vertical-align:top;
        padding:0; background:#fff; transition:background .15s;
        position:relative;
    }
    .calendar-table td:hover { background:#f8f9ff; }
    .calendar-table th:nth-child(6) { color:#e74a3b; }
    .calendar-table th:nth-child(7) { color:#e74a3b; }
    .calendar-table td:nth-child(6) { background:#fffafa; }
    .calendar-table td:nth-child(7) { background:#fffafa; }
    .calendar-table td:nth-child(6) .day-num,
    .calendar-table td:nth-child(7) .day-num { color:#e74a3b; }
    .calendar-table td.today-cell { background:#f0f4ff !important; }
    .calendar-table td.today-cell .day-num {
        background:#4e73df; color:#fff; border-radius:50%;
        width:22px; height:22px; display:flex; align-items:center;
        justify-content:center; font-size:11px; margin:4px 0 2px 4px; padding:0;
    }
    .day-num { font-size:11px; font-weight:800; color:#c5c7d0; padding:5px 6px 2px; }
    /* td는 높이 고정 안 함 — cell-inner만 고정해서 scroll 유도 */
    .cell-inner { height:76px; overflow-y:auto; overflow-x:hidden; padding:0 3px 3px; }
    .cell-inner::-webkit-scrollbar { width:2px; }
    .cell-inner::-webkit-scrollbar-thumb { background:#cdd; border-radius:2px; }
    .ad-tag {
        font-size:10px; padding:2px 5px; border-radius:4px;
        margin-top:2px; display:block; white-space:nowrap;
        overflow:hidden; text-overflow:ellipsis; cursor:pointer;
        font-weight:700; border:none;
        transition:opacity .15s, transform .15s;
    }
    .ad-tag:hover { opacity:.85; transform:translateY(-1px); }

    /* 상태 뱃지 */
    .badge-confirm { background:#d1fae5; color:#065f46; padding:3px 10px; border-radius:20px; font-weight:700; font-size:.75rem; }
    .badge-wait    { background:#fef3c7; color:#92400e; padding:3px 10px; border-radius:20px; font-weight:700; font-size:.75rem; }
    .badge-reject  { background:#fee2e2; color:#991b1b; padding:3px 10px; border-radius:20px; font-weight:700; font-size:.75rem; }
    .badge-cancel  { background:#ffedd5; color:#c2410c; padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:700; }
    .badge-expired { background:#f3f4f6; color:#6b7280; padding:3px 10px; border-radius:20px; font-weight:700; font-size:.75rem; }

    /* 테이블 */
    .ad-table th  { font-size:11px; text-transform:uppercase; color:#858796; letter-spacing:.05em; font-weight:700; position:sticky; top:0; background:#f8f9fc; z-index:1; border-bottom:2px solid #e3e6f0 !important; }
    .ad-table td  { vertical-align:middle; font-size:.875rem; }
    .ad-table tbody tr { border-bottom:1px solid #f1f3f9; transition:background .12s; }
    .ad-table tbody tr:hover { background:#f8f9ff; }
    .brand-cell   { font-weight:700; color:#2e3750; }
    .amount-cell  { font-weight:700; color:var(--primary); }
    .period-cell  { font-size:.75rem; color:#8a93a2; line-height:1.6; }
    .detail-btn   {
        font-size:.75rem; padding:4px 12px; border-radius:20px;
        border:1.5px solid #d1d5db; background:#fff; color:#555;
        font-weight:600; transition:all .15s; cursor:pointer; white-space:nowrap;
    }
    .detail-btn:hover { background:#2e3750; color:#fff; border-color:#2e3750; }
    .table-scroll-wrap { overflow-y:auto; max-height:520px; }
    .table-scroll-wrap::-webkit-scrollbar { width:4px; }
    .table-scroll-wrap::-webkit-scrollbar-thumb { background:#d0d5e8; border-radius:4px; }

    /* 진행중 리스트 */
    .running-item {
        border:none !important; border-radius:10px !important;
        margin-bottom:8px; transition:transform .2s;
    }
    .running-item:hover { transform:translateX(4px); }

    .month-nav-btn {
        width:32px; height:32px; border-radius:50%; border:1.5px solid #e0e0e0;
        background:#fff; display:flex; align-items:center; justify-content:center;
        cursor:pointer; transition:all .15s;
    }
    .month-nav-btn:hover { background:#2e3750; color:#fff; border-color:#2e3750; }
</style>
</head>

<body class="d-flex">
<aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>

<main class="main-content">
<div class="container-fluid py-2">

    <div class="d-flex align-items-center mb-4 gap-3">
        <div>
            <h4 class="fw-bold mb-0 text-dark"><i class="bi bi-megaphone-fill text-warning me-2"></i>광고 콘텐츠 관리</h4>
            <small class="text-muted">광고 신청 검토 및 일정 관리</small>
        </div>
    </div>

    <!-- 요약 통계 카드 -->
    <div class="row g-3 mb-4">
        <div class="col">
            <div class="stat-card blue">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="stat-label mb-1">전체 신청</div>
                        <div class="stat-value" id="statTotal">-</div>
                    </div>
                    <i class="bi bi-collection stat-icon text-primary"></i>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="stat-card yellow">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="stat-label mb-1">대기중</div>
                        <div class="stat-value" id="statWait">-</div>
                    </div>
                    <i class="bi bi-hourglass-split stat-icon text-warning"></i>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="stat-card green">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="stat-label mb-1">확정</div>
                        <div class="stat-value" id="statConfirm">-</div>
                    </div>
                    <i class="bi bi-check-circle stat-icon text-success"></i>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="stat-card red">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="stat-label mb-1">반려</div>
                        <div class="stat-value" id="statReject">-</div>
                    </div>
                    <i class="bi bi-x-circle stat-icon text-danger"></i>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="stat-card" style="border-left:5px solid #fd7e14;">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="stat-label mb-1">조기철회</div>
                        <div class="stat-value" id="statCancel">-</div>
                    </div>
                    <i class="bi bi-stop-circle stat-icon" style="color:#fd7e14;"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 상단 배너 관리 -->
    <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="section-card">
                <div class="section-header">
                    <h6><i class="bi bi-megaphone me-2 text-warning"></i>상단 배너 관리</h6>
                </div>
                <div class="section-body">
                    <div class="d-flex gap-2">
                        <input type="text" id="bannerInput" class="form-control"
                               th:value="${promoBanner}"
                               placeholder="배너 문구를 입력하세요">
                        <button class="btn btn-warning fw-bold px-4" onclick="saveBanner()" style="white-space:nowrap;">
                            <i class="bi bi-save me-1"></i>저장
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <!-- 차트 -->
        <div class="col-lg-8">
            <div class="section-card h-100">
                <div class="section-header">
                    <h6><i class="bi bi-bar-chart-line me-2 text-primary"></i>월별 광고 신청 건수 (최근 6개월)</h6>
                </div>
                <div class="section-body" style="height:260px;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 진행중 광고 -->
        <div class="col-lg-4">
            <div class="section-card h-100">
                <div class="section-header">
                    <h6><i class="bi bi-play-circle me-2 text-success"></i>진행중 광고</h6>
                    <span class="badge bg-success rounded-pill" id="confirmCount">0</span>
                </div>
                <div class="section-body p-3">
                    <ul class="list-group list-group-flush" id="runningList"></ul>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <!-- 캘린더 -->
        <div class="col-lg-5">
            <div class="section-card h-100">
                <div class="section-header">
                    <button class="month-nav-btn" onclick="moveMonth(-1)">
                        <i class="bi bi-chevron-left" style="font-size:.75rem;"></i>
                    </button>
                    <h6 class="m-0" th:text="${year} + '년 ' + ${month} + '월'"></h6>
                    <button class="month-nav-btn" onclick="moveMonth(1)">
                        <i class="bi bi-chevron-right" style="font-size:.75rem;"></i>
                    </button>
                </div>
                <div class="section-body p-2">
                    <div class="cal-wrap">
                    <table class="calendar-table">
                        <thead>
                            <tr><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th>일</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="week : ${calendarWeeks}">
                                <td th:each="day : ${week}">
                                    <div class="cell-inner">
                                        <div class="day-num" th:if="${day != null}" th:text="${#temporals.day(day)}"></div>
                                        <div th:each="ad : ${adList}"
                                             th:if="${day != null and ad.status == 'CONFIRM' and day >= ad.startDate and day <= ad.endDate}">
                                            <span class="ad-tag"
                                                  th:text="${ad.brandName}"
                                                  th:attr="data-brand=${ad.brandName}, data-adid=${ad.adId}"
                                                  data-bs-toggle="modal"
                                                  data-bs-target="#adDetailModal"></span>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    </div><!-- /cal-wrap -->
                </div>
            </div>
        </div>

        <!-- 신청 내역 테이블 -->
        <div class="col-lg-7">
            <div class="section-card h-100">
                <div class="section-header">
                    <h6><i class="bi bi-list-ul me-2 text-primary"></i>광고 신청 내역</h6>
                </div>
                <div class="section-body p-0 d-flex flex-column" style="min-height:0;">
                    <div class="table-responsive table-scroll-wrap flex-grow-1">
                        <table class="table mb-0 ad-table">
                            <thead>
                                <tr>
                                    <th class="ps-3 py-3">브랜드</th>
                                    <th>담당자</th>
                                    <th>기간</th>
                                    <th>금액</th>
                                    <th>상태</th>
                                    <th class="pe-3 text-center">관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="ad : ${adList}">
                                    <td class="ps-3" th:with="c=${ad.brandName}">
                                        <div class="d-flex align-items-center gap-2">
                                            <div class="brand-dot" th:attr="data-brand=${ad.brandName}"
                                                 style="width:8px;height:8px;border-radius:50%;background:#4e73df;flex-shrink:0;"></div>
                                            <span class="brand-cell" th:text="${ad.brandName}"></span>
                                        </div>
                                    </td>
                                    <td class="text-muted small" th:text="${ad.managerName}"></td>
                                    <td class="period-cell">
                                        <div th:if="${ad.startDate != null}">
                                            <i class="bi bi-calendar3 me-1" style="color:#a0aec0;"></i>
                                            <span th:text="${ad.startDate}"></span>
                                        </div>
                                        <div th:if="${ad.endDate != null}">
                                            <i class="bi bi-arrow-right me-1" style="color:#a0aec0;"></i>
                                            <span th:text="${ad.endDate}"></span>
                                        </div>
                                    </td>
                                    <td class="amount-cell fw-bold" th:text="${#numbers.formatInteger(ad.amount, 3, 'COMMA')} + '원'"></td>
                                    <td th:with="expired=${ad.status == 'CONFIRM' and ad.endDate != null and ad.endDate.isBefore(#temporals.createToday())}">
                                        <span th:class="${expired ? 'badge-expired' :
                                                          (ad.status == 'CONFIRM' ? 'badge-confirm' :
                                                          (ad.status == 'WAIT'    ? 'badge-wait'    :
                                                          (ad.status == 'CANCEL'  ? 'badge-cancel'  : 'badge-reject')))}"
                                              th:text="${expired ? '기간만료' :
                                                         (ad.status == 'CONFIRM' ? '✓ 확정' :
                                                         (ad.status == 'WAIT'    ? '⏳ 대기' :
                                                         (ad.status == 'CANCEL'  ? '🚫 철회' : '✗ 반려')))}"></span>
                                    </td>
                                    <td class="pe-3 text-center">
                                        <button class="detail-btn"
                                                data-bs-toggle="modal"
                                                data-bs-target="#adDetailModal"
                                                th:attr="data-adid=${ad.adId}">
                                            <i class="bi bi-search me-1"></i>보기
                                        </button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(adList)}">
                                    <td colspan="5" class="text-center text-muted py-5">신청 내역이 없습니다.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</main>

<div th:replace="~{admin/fragments/ad_modal :: adModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const ctx = /*[[@{/}]]*/ '/';
    const base = ctx.replace(/\/$/, '');
    let ads = /*[[${adList}]]*/ [];
    let year  = /*[[${year}]]*/ 0;
    let month = /*[[${month}]]*/ 0;
    let selectedAdId = null;
    const chartLabels = /*[[${chartLabels}]]*/ [];
    const chartData   = /*[[${chartData}]]*/  [];

    function getBrandColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        const h = Math.abs(hash) % 360;
        return {
            bg:     `hsl(${h},45%,94%)`,
            border: `hsl(${h},40%,85%)`,
            text:   `hsl(${h},50%,35%)`
        };
    }

    function moveMonth(diff) {
        month += diff;
        if (month < 1)  { month = 12; year--; }
        if (month > 12) { month = 1;  year++; }
        location.href = base + '/admin/contents?year=' + year + '&month=' + month;
    }

    function loadAdDetail(adId) {
        selectedAdId = adId;
        fetch(base + '/admin/ad/detail?adId=' + selectedAdId)
            .then(res => res.json())
            .then(data => {
                if (!data.ad) return;
                const ad = data.ad;

                // 기본 정보
                document.getElementById('brandName').innerText    = ad.brandName    || '';
                document.getElementById('managerName').innerText  = ad.managerName  || '';
                document.getElementById('phone').innerText        = ad.phone        || '';
                document.getElementById('companyEmail').innerText = ad.companyEmail || '';
                document.getElementById('targetEmail').value      = ad.companyEmail || '';
                document.getElementById('content').innerText      = ad.content      || '';
                document.getElementById('period').innerText       = (ad.startDate || '') + ' ~ ' + (ad.endDate || '');
                document.getElementById('durationWeeks').innerText = ad.durationWeeks || '';
                document.getElementById('amount').innerText       = Number(ad.amount).toLocaleString();
                // 요약 미니 카드
                document.getElementById('summaryWeeks').innerText  = (ad.durationWeeks || '-') + '주';
                document.getElementById('summaryAmount').innerText = Number(ad.amount).toLocaleString() + '원';

                // 이미지
                const adImage   = document.getElementById('adImage');
                const noImgText = document.getElementById('noImageText');
                const dlBtn     = document.getElementById('downloadBtn');
                if (ad.filePath) {
                    adImage.src          = base + ad.filePath;
                    adImage.style.display = 'block';
                    noImgText.style.display = 'none';
                    dlBtn.href           = base + '/admin/ad/download?adId=' + selectedAdId;
                    dlBtn.style.display  = '';
                } else {
                    adImage.style.display   = 'none';
                    noImgText.style.display = '';
                    dlBtn.style.display     = 'none';
                }

                // 상태 배지 (헤더)
                const badge = document.getElementById('adStatusBadge');
                if (ad.status === 'CONFIRM') {
                    badge.className   = 'badge bg-success fs-6 px-3 py-1';
                    badge.textContent = '✓ 확정';
                } else if (ad.status === 'WAIT') {
                    badge.className   = 'badge bg-warning text-dark fs-6 px-3 py-1';
                    badge.textContent = '⏳ 대기중';
                } else {
                    badge.className   = 'badge bg-danger fs-6 px-3 py-1';
                    badge.textContent = '✗ 반려';
                }

                // 확정/반려 시 액션 잠금
                const actionArea      = document.getElementById('actionArea');
                const withdrawArea    = document.getElementById('withdrawArea');
                const statusCompleted = document.getElementById('statusCompleted');
                const statusIcon      = document.getElementById('statusIcon');
                const statusText      = document.getElementById('statusText');
                const processedAtText = document.getElementById('processedAtText');

                const rejectReasonBox  = document.getElementById('rejectReasonBox');
                const rejectReasonText = document.getElementById('rejectReasonText');

                if (ad.status === 'CONFIRM') {
                    actionArea.classList.add('d-none');
                    rejectReasonBox.classList.add('d-none');
                    statusCompleted.classList.remove('d-none');

                    // 기간만료 여부 체크
                    const _end = ad.endDate ? new Date(ad.endDate) : null;
                    const _today = new Date(); _today.setHours(0,0,0,0);
                    const _expired = _end && _end < _today;

                    if (_expired) {
                        if (withdrawArea) withdrawArea.classList.add('d-none');
                        statusCompleted.style.background = '#f5f5f5';
                        statusIcon.textContent  = '⏰';
                        statusText.textContent  = '기간 만료';
                        statusText.style.color  = '#888';
                        processedAtText.textContent = ad.endDate ? '만료일: ' + ad.endDate : '';
                    } else {
                        if (withdrawArea) withdrawArea.classList.remove('d-none');
                        statusCompleted.style.background = '#e8faf4';
                        statusIcon.textContent  = '✅';
                        statusText.textContent  = '광고 확정 완료';
                        statusText.style.color  = '#1cc88a';
                        processedAtText.textContent = ad.approvedAt ? '승인일시: ' + ad.approvedAt : '';
                    }
                } else if (ad.status === 'CANCEL') {
                    actionArea.classList.add('d-none');
                    if (withdrawArea) withdrawArea.classList.add('d-none');
                    statusCompleted.classList.remove('d-none');
                    statusCompleted.style.background = '#fff8e1';
                    statusIcon.textContent  = '🚫';
                    statusText.textContent  = '조기 철회됨';
                    statusText.style.color  = '#f6c23e';
                    processedAtText.textContent = '';
                    if (ad.rejectedReason) {
                        rejectReasonBox.classList.remove('d-none');
                        rejectReasonText.textContent = ad.rejectedReason;
                    } else {
                        rejectReasonBox.classList.add('d-none');
                    }
                } else if (ad.status === 'REJECT') {
                    actionArea.classList.add('d-none');
                    if (withdrawArea) withdrawArea.classList.add('d-none');
                    statusCompleted.classList.remove('d-none');
                    statusCompleted.style.background = '#fff2f1';
                    statusIcon.textContent  = '❌';
                    statusText.textContent  = '반려됨';
                    statusText.style.color  = '#e74a3b';
                    processedAtText.textContent = '';
                    if (ad.rejectedReason) {
                        rejectReasonBox.classList.remove('d-none');
                        rejectReasonText.textContent = ad.rejectedReason;
                    } else {
                        rejectReasonBox.classList.add('d-none');
                    }
                } else {
                    actionArea.classList.remove('d-none');
                    if (withdrawArea) withdrawArea.classList.add('d-none');
                    statusCompleted.classList.add('d-none');
                    rejectReasonBox.classList.add('d-none');
                    document.getElementById('mailTitle').value   = '';
                    document.getElementById('mailContent').value = '';
                }

                // 겹침 알림
                const conflictBox = document.getElementById('conflictMessage');
                if (data.conflictAds && data.conflictAds.length > 0) {
                    const names = data.conflictAds.map(a => a.brandName).join(', ');
                    conflictBox.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-1"></i> <b>${names}</b> 광고와 일정이 겹칩니다.`;
                    conflictBox.classList.remove('d-none');
                } else {
                    conflictBox.classList.add('d-none');
                }
            });
    }

    document.addEventListener('DOMContentLoaded', function () {
        // 통계 카드
        const total   = ads.length;
        const waiting = ads.filter(a => a.status === 'WAIT').length;
        const confirm = ads.filter(a => a.status === 'CONFIRM').length;
        const reject  = ads.filter(a => a.status === 'REJECT').length;
        const cancel  = ads.filter(a => a.status === 'CANCEL').length;
        document.getElementById('statTotal').textContent   = total;
        document.getElementById('statWait').textContent    = waiting;
        document.getElementById('statConfirm').textContent = confirm;
        document.getElementById('statReject').textContent  = reject;
        document.getElementById('statCancel').textContent  = cancel;
        document.getElementById('confirmCount').textContent = confirm;

        // 진행중 리스트 (기간만료 제외)
        const runningList = document.getElementById('runningList');
        const today       = new Date(); today.setHours(0,0,0,0);
        const confirmAds  = ads.filter(a => {
            if (a.status !== 'CONFIRM') return false;
            const endDate = a.endDate ? new Date(a.endDate) : null;
            return !endDate || endDate >= today;
        });
        document.getElementById('confirmCount').textContent = confirmAds.length;
        if (confirmAds.length === 0) {
            runningList.innerHTML = `<li class="list-group-item text-center text-muted py-4 border-0">
                <i class="bi bi-info-circle me-1"></i>진행중인 광고가 없습니다.</li>`;
        } else {
            runningList.innerHTML = confirmAds.map(ad => {
                const c = getBrandColor(ad.brandName);
                return `<li class="list-group-item running-item p-3 shadow-sm"
                            style="border-left:5px solid ${c.border}!important; background:${c.bg}; border-radius:10px;">
                    <div class="d-flex justify-content-between align-items-center">
                        <b style="color:${c.text}">${ad.brandName}</b>
                        <span class="badge bg-success small">진행중</span>
                    </div>
                    <small class="text-muted"><i class="bi bi-calendar3 me-1"></i>${ad.startDate} ~ ${ad.endDate}</small>
                </li>`;
            }).join('');
        }

        // 달력 태그 색상
        document.querySelectorAll('.ad-tag').forEach(tag => {
            const bn = tag.getAttribute('data-brand');
            if (bn) {
                const c = getBrandColor(bn);
                tag.style.backgroundColor = c.bg;
                tag.style.color           = c.text;
                tag.style.borderColor     = c.border;
            }
        });

        // 테이블 브랜드 dot 색상
        document.querySelectorAll('.brand-dot').forEach(dot => {
            const bn = dot.getAttribute('data-brand');
            if (bn) dot.style.background = getBrandColor(bn).text;
        });

        // 오늘 날짜 셀 하이라이트
        const todayStr = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'})
            .replace(/\. /g,'-').replace('.','').trim();
        const todayDay = new Date().getDate();
        document.querySelectorAll('.calendar-table td').forEach(td => {
            const dayEl = td.querySelector('.day-num');
            if (dayEl && parseInt(dayEl.textContent) === todayDay) {
                // 현재 달 표시 중일 때만 today 하이라이트
                if (year === new Date().getFullYear() && month === new Date().getMonth() + 1) {
                    td.classList.add('today-cell');
                }
            }
        });

        // 모달 트리거
        document.addEventListener('click', function (e) {
            const target = e.target.closest('[data-adid]');
            if (target) loadAdDetail(target.dataset.adid);
        });

        // 차트
        new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: chartLabels.length > 0 ? chartLabels : ['데이터 없음'],
                datasets: [{
                    label: '광고 신청 건수',
                    data: chartData.length > 0 ? chartData : [0],
                    borderColor: '#4e73df',
                    backgroundColor: 'rgba(78,115,223,0.08)',
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#4e73df',
                    pointRadius: 4,
                    fill: true,
                    tension: 0.35
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#f1f1f1' }, ticks: { font: { size: 11 } } },
                    x: { grid: { display: false }, ticks: { font: { size: 11 } } }
                }
            }
        });
    });

    function approveAd() {
        if (!selectedAdId) return alert('광고를 선택해주세요.');
        if (!confirm('광고를 승인하고 게시 확정하시겠습니까?')) return;
        fetch(base + '/admin/ad/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'adId=' + selectedAdId
        }).then(() => location.reload());
    }

    function saveBanner() {
        const text = document.getElementById('bannerInput').value.trim();
        if (!text) return alert('배너 문구를 입력해주세요.');
        fetch(base + '/admin/banner/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'text=' + encodeURIComponent(text)
        }).then(res => res.text()).then(() => alert('배너가 저장되었습니다.'));
    }

    function withdrawAd() {
        if (!selectedAdId) return alert('광고를 선택해주세요.');
        const reason = document.getElementById('withdrawReason').value.trim();
        if (!reason) return alert('철회 사유를 입력해주세요.');
        if (!confirm('광고를 조기 철회하시겠습니까? 메인 페이지에서 즉시 내려갑니다.')) return;
        fetch(base + '/admin/ad/withdraw', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'adId=' + selectedAdId + '&reason=' + encodeURIComponent(reason)
        }).then(() => location.reload());
    }

    function rejectAd() {
        if (!selectedAdId) return alert('광고를 선택해주세요.');
        const reason = document.getElementById('mailContent').value;
        if (!reason) return alert('반려 사유를 메일 내용에 입력해주세요.');
        if (!confirm('반려 처리하시겠습니까?')) return;
        fetch(base + '/admin/ad/reject', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'adId=' + selectedAdId + '&reason=' + encodeURIComponent(reason)
        }).then(() => location.reload());
    }

    function setApproveTemplate() {
        const brand = document.getElementById('brandName').innerText;
        document.getElementById('mailTitle').value   = `[광고 승인 안내] ${brand} 광고 신청이 승인되었습니다.`;
        document.getElementById('mailContent').value = `안녕하세요, ${brand} 담당자님.\n\n신청하신 광고가 검토 후 최종 승인되었습니다.\n광고는 신청하신 기간에 게시될 예정입니다.\n\n감사합니다.`;
    }

    function setRejectTemplate() {
        const brand = document.getElementById('brandName').innerText;
        document.getElementById('mailTitle').value   = `[광고 반려 안내] ${brand} 광고 신청이 반려되었습니다.`;
        document.getElementById('mailContent').value = `안녕하세요, ${brand} 담당자님.\n\n신청하신 광고를 검토한 결과 아래 사유로 반려되었습니다.\n\n반려 사유: \n\n수정 후 재신청 부탁드립니다. 감사합니다.`;
    }
    /*]]>*/
</script>
