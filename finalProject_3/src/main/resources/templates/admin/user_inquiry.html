<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::head}, ~{::main}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="ko">
<head>
    <title>고객센터 - 문의게시판</title>
    <link rel="stylesheet" th:href="@{/css/inquiry.css}"> <style>
        /* 게시판 전용 스타일링 */
        .board-container { padding: 40px 0; max-width: 1000px; margin: 0 auto; }
        .board-title { margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 15px; }
        .table thead th { border-top: 1px solid #dee2e6; background-color: #fcfcfc; }
        .faq-row { background-color: #f8faff; } /* FAQ 줄 배경색 살짝 다르게 */
        .badge-faq { background-color: #007bff; color: white; padding: 5px 8px; border-radius: 4px; font-size: 0.75rem; }
        .search-area { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .btn-write { background-color: #333; color: #fff; border-radius: 0; padding: 10px 25px; }
        .btn-write:hover { background-color: #000; color: #fff; }
        a { text-decoration: none; color: #333; }
        a:hover { text-decoration: underline; }
    </style>
</head>

<body>
<main>
    <div class="board-container">
        <div class="board-title d-flex justify-content-between align-items-end">
            <h2 class="fw-bold m-0">Q&A 문의게시판</h2>
            <p class="text-muted m-0 small">궁금하신 점을 남겨주시면 정성껏 답변해 드립니다.</p>
        </div>

        <div class="search-area d-flex justify-content-between align-items-center">
            <div class="small">
                전체 게시글 <span class="fw-bold text-primary" th:text="${#lists.size(inquiryList)}">0</span>건
            </div>
            <form class="d-flex gap-2">
                <select class="form-select form-select-sm" style="width: 100px;">
                    <option value="title">제목</option>
                    <option value="content">내용</option>
                </select>
                <input type="text" class="form-control form-control-sm" placeholder="검색어를 입력하세요" style="width: 200px;">
                <button class="btn btn-outline-dark btn-sm">검색</button>
            </form>
        </div>

        <div class="table-responsive">
            <table class="table table-hover border-bottom">
                <thead class="text-center small text-uppercase fw-bold">
                    <tr>
                        <th style="width: 80px;">번호</th>
                        <th>제목</th>
                        <th style="width: 120px;">작성자</th>
                        <th style="width: 120px;">작성일</th>
                        <th style="width: 100px;">상태</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="faq : ${faqList}" class="faq-row align-middle">
                        <td class="text-center"><span class="badge-faq">FAQ</span></td>
                        <td class="fw-bold">
                            <a th:href="@{/inquiry/detail(id=${faq.inquiryId})}" th:text="${faq.title}">자주 묻는 질문입니다.</a>
                        </td>
                        <td class="text-center small">관리자</td>
                        <td class="text-center small text-muted" th:text="${#dates.format(faq.createdAt, 'yyyy-MM-dd')}">2026-03-09</td>
                        <td class="text-center"><span class="text-primary fw-bold">-</span></td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(inquiryList)}">
                        <td colspan="5" class="text-center py-5 text-muted">등록된 문의사항이 없습니다.</td>
                    </tr>
                    <tr th:each="inq : ${inquiryList}" class="align-middle">
                        <td class="text-center text-muted small" th:text="${inq.inquiryId}">1</td>
                        <td>
                            <span th:if="${inq.isPrivate == 'Y'}" class="me-1">🔒</span>
                            <a th:href="@{/inquiry/detail(id=${inq.inquiryId})}" th:text="${inq.title}">상품 배송 문의드립니다.</a>
                        </td>
                        <td class="text-center small" th:text="${#strings.substring(inq.memberEmail, 0, 4) + '****'}">user****</td>
                        <td class="text-center small text-muted" th:text="${#dates.format(inq.createdAt, 'yyyy-MM-dd')}">2026-03-09</td>
                        <td class="text-center">
                            <span class="badge rounded-pill shadow-sm" 
                                  th:classappend="${inq.inquiryStatus == '대기' ? 'bg-secondary' : 'bg-success'}"
                                  th:text="${inq.inquiryStatus}" 
                                  style="font-size: 0.7rem; padding: 5px 10px;">대기</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-end mt-4">
            <a th:href="@{/inquiry/write}" class="btn btn-write shadow-sm">문의하기</a>
        </div>

        </div>
</main>
<script>
    // 게시판 관련 JS 로직 (필요 시)
</script>
</body>
</html>
