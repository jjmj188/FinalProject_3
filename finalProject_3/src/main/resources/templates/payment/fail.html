<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::head}, ~{::main}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="ko">
<head>
    <link rel="stylesheet" th:href="@{/css/payment/checkout.css}">
</head>

<body>
<main>
<section class="pay-page">
    <div class="pay-result-container">

        <div class="pay-result-card pay-result-fail">
            <!-- 실패 아이콘 -->
            <div class="pay-result-icon pay-result-icon-fail">
                <i class="fa-solid fa-circle-xmark"></i>
            </div>

            <h1 class="pay-result-title">결제에 실패했습니다</h1>
            <p class="pay-result-desc" th:text="${errorMessage != null ? errorMessage : '결제 처리 중 문제가 발생했습니다.'}">
                결제 처리 중 문제가 발생했습니다.
            </p>

            <!-- 오류 정보 -->
            <div class="pay-result-info" th:if="${errorCode != null}">
                <div class="pay-result-row">
                    <span class="pay-result-label">오류 코드</span>
                    <span class="pay-result-value" th:text="${errorCode}">ERROR_CODE</span>
                </div>
                <div class="pay-result-row" th:if="${orderId != null}">
                    <span class="pay-result-label">주문번호</span>
                    <span class="pay-result-value" th:text="${orderId}">ORDER_XXX</span>
                </div>
            </div>

            <div class="pay-result-actions">
                <a onclick="history.back()" class="pay-btn" style="cursor:pointer;">
                    <i class="fa-solid fa-arrow-left"></i> 다시 시도하기
                </a>
                <a th:href="@{/product/product_list}" class="pay-btn pay-btn-secondary">
                    상품목록으로
                </a>
            </div>
        </div>

    </div>
</section>
</main>
<script></script>
</body>
</html>
