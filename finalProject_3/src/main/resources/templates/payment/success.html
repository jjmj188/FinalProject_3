<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::head}, ~{::main}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="ko">
<head>
    <link rel="stylesheet" th:href="@{/css/payment/checkout.css}">
</head>

<body>
<main>
<section class="pay-page">
    <div class="pay-result-container">

        <div class="pay-result-card pay-result-success">
            <!-- 성공 아이콘 -->
            <div class="pay-result-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>

            <h1 class="pay-result-title">결제가 완료되었습니다</h1>
            <p class="pay-result-desc">
                안전결제(에스크로)가 적용되었습니다.<br>
                상품 수령 후 <strong>구매확인</strong>을 해주세요.
            </p>

            <!-- 결제 정보 -->
            <div class="pay-result-info">
                <div class="pay-result-row">
                    <span class="pay-result-label">주문번호</span>
                    <span class="pay-result-value" th:text="${transaction.tossOrderId}">ORDER_XXX</span>
                </div>
                <div class="pay-result-row">
                    <span class="pay-result-label">상품명</span>
                    <span class="pay-result-value" th:text="${transaction.productName}">상품명</span>
                </div>
                <div class="pay-result-row">
                    <span class="pay-result-label">결제금액</span>
                    <span class="pay-result-value pay-result-amount"
                          th:text="${#numbers.formatInteger(transaction.amount, 3, 'COMMA')} + '원'">
                        60,000원
                    </span>
                </div>
                <div class="pay-result-row">
                    <span class="pay-result-label">결제수단</span>
                    <span class="pay-result-value" th:text="${transaction.paymentType}">카드결제</span>
                </div>
                <div class="pay-result-row">
                    <span class="pay-result-label">판매자</span>
                    <span class="pay-result-value" th:text="${transaction.sellerName}">판매자</span>
                </div>
                <div class="pay-result-row">
                    <span class="pay-result-label">거래상태</span>
                    <span class="pay-result-value">
                        <span class="pay-badge pay-badge-escrow">에스크로 보관중</span>
                    </span>
                </div>
            </div>

            <!-- 에스크로 안내 -->
            <div class="pay-escrow-notice">
                <i class="fa-solid fa-shield-halved"></i>
                <div>
                    <strong>안전결제 안내</strong>
                    <p>결제 금액은 에스크로 계좌에 안전하게 보관됩니다. 상품을 수령하신 후 구매확인 버튼을 눌러주시면 판매자에게 대금이 전달됩니다.</p>
                </div>
            </div>

            <!-- 구매확인 버튼 -->
            <div class="pay-result-actions">
                <button id="btnEscrowConfirm" class="pay-btn pay-btn-confirm" type="button"
                        th:data-transaction-id="${transaction.transactionId}">
                    <i class="fa-solid fa-check"></i> 구매확인
                </button>
                <a th:href="@{/product/product_list}" class="pay-btn pay-btn-secondary">
                    계속 쇼핑하기
                </a>
            </div>
        </div>

    </div>
</section>

<input type="hidden" id="contextPath" th:value="@{/}">

<script>
document.addEventListener('DOMContentLoaded', function() {
    const contextPath = document.getElementById('contextPath').value.replace(/\/$/, '');

    const confirmBtn = document.getElementById('btnEscrowConfirm');
    if (confirmBtn) {
        confirmBtn.addEventListener('click', function() {
            if (!confirm('상품을 정상적으로 수령하셨나요?\n구매확인 후에는 취소가 불가능합니다.')) {
                return;
            }

            const txnId = parseInt(this.getAttribute('data-transaction-id'));

            fetch(contextPath + '/payment/escrow/confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ transactionId: txnId })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    alert('구매확인이 완료되었습니다!\n판매자에게 대금이 전달됩니다.');
                    location.reload();
                } else {
                    alert(data.message || '구매확인 처리에 실패했습니다.');
                }
            })
            .catch(function(err) {
                console.error('구매확인 오류:', err);
                alert('구매확인 처리 중 오류가 발생했습니다.');
            });
        });
    }
});
</script>
</main>
</body>
</html>
