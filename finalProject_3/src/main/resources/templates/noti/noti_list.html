<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::head}, ~{::main}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <link rel="stylesheet" th:href="@{/css/mypage/mypage.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>메시지함</title>
    <style>
        .noti-card {
            background: #fff;
            border: 1px solid #e8f5e9;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.06);
            margin-bottom: 12px;
            padding: 18px 20px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s;
            text-decoration: none;
            color: inherit;
        }
        .noti-card:hover {
            border-color: #86efac;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.12);
        }
        .noti-card.unread {
            border-left: 4px solid #16a34a;
            background: #f0fdf4;
        }
        .noti-card.read {
            border-left: 4px solid transparent;
            opacity: .85;
        }
        .noti-icon {
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .noti-icon.admin { background: #e8f5e9; color: #16a34a; }
        .noti-icon.trade { background: #e8fff5; color: #1cc88a; }
        .noti-icon.other { background: #fff3e0; color: #f6c23e; }
        .noti-title { font-weight: 700; font-size: .95rem; color: #1a1a1a; margin-bottom: 4px; }
        .noti-msg   { font-size: .85rem; color: #555; line-height: 1.5; }
        .noti-date  { font-size: .75rem; color: #aaa; margin-top: 6px; }
        .unread-dot { width: 8px; height: 8px; background: #16a34a; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
        .empty-box  { text-align: center; padding: 80px 0; color: #bbb; }
        .empty-box i { font-size: 3rem; display: block; margin-bottom: 12px; color: #d1fae5; }
        .noti-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .noti-read-all-btn {
            padding: 7px 16px;
            border: 1px solid #16a34a;
            border-radius: 6px;
            background: #fff;
            color: #16a34a;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
        }
        .noti-read-all-btn:hover { background: #f0fdf4; }
        .noti-read-all-btn:disabled { border-color: #ddd; color: #bbb; cursor: not-allowed; }
        .noti-count-text { font-size: 13px; color: #999; margin-bottom: 16px; }
    </style>
</head>
<main>
    <div class="mp-container">
        <!-- 마이페이지 사이드바 -->
        <aside class="mp-sidebar">
            <h2 class="mp-sidebar-title">마이페이지</h2>
            <nav class="mp-nav">
                <ul>
                    <li><a th:href="@{/mypage/main}">내 정보</a></li>
                    <li><a th:href="@{/mypage/main}">계좌/배송지 관리</a></li>
                    <li><a th:href="@{/mypage/main}">후기관리</a></li>
                    <li><a th:href="@{/mypage/main}">찜내역</a></li>
                    <li><a th:href="@{/mypage/main}">신고관리</a></li>
                    <li><a th:href="@{/noti/list}" class="active">메시지함</a></li>
                </ul>
            </nav>
            <div class="mp-exit-wrap">
                <a href="#" class="mp-exit-btn">탈퇴하기</a>
            </div>
        </aside>

        <!-- 메시지함 컨텐츠 -->
        <section class="mp-content">
            <div class="mp-section-title">
                메시지함
                <span class="mp-count-badge ms-2" th:if="${unreadCount > 0}" th:text="${unreadCount} + '개 안읽음'"></span>
            </div>

            <div class="noti-header-bar">
                <span class="noti-count-text" th:text="${#lists.size(notiList)} + '개의 메시지'"></span>
                <button class="noti-read-all-btn" onclick="readAll()" th:disabled="${unreadCount == 0}">
                    <i class="bi bi-check2-all me-1"></i>전체 읽음
                </button>
            </div>

            <!-- 알림 없음 -->
            <div class="empty-box" th:if="${#lists.isEmpty(notiList)}">
                <i class="bi bi-bell-slash"></i>
                <p>메시지가 없습니다.</p>
            </div>

            <!-- 알림 목록 -->
            <div th:each="noti : ${notiList}">
                <div class="noti-card"
                     th:classappend="${noti.readStatus == 0} ? 'unread' : 'read'"
                     th:attr="data-no=${noti.notiNo}"
                     onclick="markRead(this)">
                    <div class="noti-icon"
                         th:classappend="${noti.notiType == 'ADMIN'} ? 'admin' : (${noti.notiType == 'TRADE'} ? 'trade' : 'other')">
                        <i class="bi"
                           th:classappend="${noti.notiType == 'ADMIN'} ? 'bi-shield-check' : (${noti.notiType == 'TRADE'} ? 'bi-bag-check' : 'bi-bell')"></i>
                    </div>
                    <div style="flex:1;">
                        <div class="noti-title" th:text="${noti.title}"></div>
                        <div class="noti-msg"   th:text="${noti.message}"></div>
                        <div class="noti-date"  th:text="${noti.regDate}"></div>
                    </div>
                    <div class="unread-dot" th:if="${noti.readStatus == 0}"></div>
                </div>
            </div>
        </section>
    </div>
</main>
<script th:inline="javascript">
    /*<![CDATA[*/
    const _ctx = (/*[[@{/}]]*/ '/').replace(/\/$/, '');

    function markRead(card) {
        const notiNo = card.dataset.no;
        if (card.classList.contains('read')) return;
        fetch(_ctx + '/noti/read/' + notiNo, { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    card.classList.remove('unread');
                    card.classList.add('read');
                    const dot = card.querySelector('.unread-dot');
                    if (dot) dot.remove();
                    const badge = document.querySelector('.mp-count-badge');
                    if (badge) {
                        const cur = parseInt(badge.textContent) - 1;
                        if (cur <= 0) badge.remove();
                        else badge.textContent = cur + '개 안읽음';
                    }
                }
            });
    }

    function readAll() {
        fetch(_ctx + '/noti/readAll', { method: 'POST' })
            .then(r => r.json())
            .then(data => { if (data.success) location.reload(); });
    }
    /*]]>*/
</script>
</html>
