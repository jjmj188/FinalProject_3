<!DOCTYPE html>
<html
    th:replace="~{layout/layout_main :: layout(~{::head}, ~{::main}, ~{::script})}"
    xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <link rel="stylesheet" th:href="@{/css/price_check.css}">
    <link rel="stylesheet" th:href="@{/css/check.css}">
    <script defer th:src="@{/js/check.js}"></script>

    <style type="text/css">
        .mk-canvasWrap {
            position: relative;
            width: 100%;
            height: 340px;
            min-height: 340px;
        }

        #mkChart {
            display: block;
            width: 100%;
            height: 100%;
        }

        .mk-tip {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, calc(-100% - 12px));
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            white-space: nowrap;
            z-index: 20;
            transition: opacity .15s ease;
        }

        .mk-tip-date {
            font-size: 13px;
            font-weight: 700;
            color: #222;
            margin-bottom: 6px;
        }

        .mk-tip-price {
            font-size: 13px;
            color: #444;
        }

        .mk-empty-msg {
            display: none;
            position: absolute;
            inset: 0;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #666;
            font-size: 15px;
        }
    </style>
</head>

<body>
<main>
    <!-- 검색 -->
    <section class="hero">
        <div class="hero-inner">
            <h1 class="hero-title">시세조회</h1>

            <p style="text-align:center; margin-bottom:8px;">
                원하시는 상품이 얼마에 등록되고 있는지 알아보세요
            </p>

            <p style="text-align:center; margin-bottom:18px; color:#666; font-size:14px;">
                최근 30일 기준 시세를 보여드립니다
            </p>

            <div class="search-wrap">
			    <div class="search-pill" style="position: relative;">
			        <input
			            class="search-input"
			            id="searchWord"
			            name="searchWord"
			            type="text"
			            th:value="${searchWord}"
			            placeholder="검색어를 입력해주세요"
			            autocomplete="off" />
			
			        <button class="search-btn" id="searchBtn" type="button">
			            <i class="fa-solid fa-magnifying-glass"></i>
			        </button>
			
			        <!-- 자동완성 리스트 -->
			        <div id="displayList"></div>
			    </div>
			</div>
        </div>
    </section>

    <!-- 검색 후 결과가 있을 때만 노출 -->
    <div th:if="${hasResult}">

        <!-- 시세조회 -->
        <section class="mk-wrap">
            <section class="mk-card" aria-label="시세 확인">
                <div class="mk-head">
                    <div>
                        <div class="mk-title">시세금액</div>
                        <div class="mk-price" id="mkPrice">
                            <span th:text="${priceStats != null ? #numbers.formatInteger(priceStats.avgPrice, 3, 'COMMA') : '0'}">0</span>
                            <small>원</small>
                        </div>
                    </div>

                    <div class="mk-tabs" role="tablist" aria-label="가격 종류 탭">
                        <button class="mk-tab"
                                th:classappend="${priceMode == null or priceMode == 'all' ? ' is-active' : ''}"
                                data-mode="all"
                                role="tab"
                                th:attr="aria-selected=${priceMode == null or priceMode == 'all' ? 'true' : 'false'}"
                                type="button">전체</button>

                        <button class="mk-tab"
                                th:classappend="${priceMode == null or priceMode == 'list' ? ' is-active' : ''}"
                                data-mode="list"
                                role="tab"
                                th:attr="aria-selected=${priceMode == null or priceMode == 'list' ? 'true' : 'false'}"
                                type="button">등록가</button>

                        <button class="mk-tab"
                                th:classappend="${priceMode == 'sale' ? ' is-active' : ''}"
                                data-mode="sale"
                                role="tab"
                                th:attr="aria-selected=${priceMode == 'sale' ? 'true' : 'false'}"
                                type="button">판매가</button>
                    </div>
                </div>

                <div class="mk-chartInfo" style="margin-bottom:14px;">
                    <div style="font-size:14px; color:#666;">
                        <strong th:text="|&quot;${searchWord}&quot;|">"검색어"</strong>
                        검색 결과
                        <strong th:text="${priceStats != null ? priceStats.sampleCount : 0}">0</strong>건
                    </div>

                    <div th:if="${priceStats != null and priceStats.sampleCount > 0 and priceStats.sampleCount < 3}"
                         style="margin-top:8px; padding:10px 12px; border-radius:10px; background:#fff8e8; color:#9a6b00; font-size:14px;">
                        최근 30일 기준
                        <strong th:text="${priceStats.sampleCount}">0</strong>건으로 참고용 시세입니다.
                    </div>
                </div>

                <div class="mk-chartBox">
                    <div class="mk-canvasWrap">
                        <canvas id="mkChart" aria-label="시세 추이 차트"></canvas>
                        <div class="mk-tip" id="mkTip"></div>
                        <div class="mk-empty-msg" id="mkEmptyMsg">등록된 상품 데이터가 없습니다.</div>
                    </div>

                    <div class="mk-legend" aria-label="차트 범례">
                        <div class="mk-legItem">
                            <span class="mk-dot green"></span>등록가
                        </div>
                        <div class="mk-legItem">
                            <span class="mk-dot blue"></span>판매가
                        </div>
                    </div>
                </div>
            </section>
        </section>

        <!-- 상단 요약 -->
        <div class="top-summary">
            <div class="summary-title">
                <i class="fa-solid fa-chart-simple"></i> 최근 30일 기준 등록 상품의 가격을 비교해봤어요
            </div>

            <div class="stats">
                <div class="stat">
                    <span>평균 가격</span>
                    <strong th:text="${priceStats != null ? #numbers.formatInteger(priceStats.avgPrice, 3, 'COMMA') + '원' : '0원'}">0원</strong>
                </div>

                <div class="stat">
                    <span>가장 높은 가격</span>
                    <strong th:text="${priceStats != null ? #numbers.formatInteger(priceStats.maxPrice, 3, 'COMMA') + '원' : '0원'}">0원</strong>
                </div>

                <div class="stat">
                    <span>가장 낮은 가격</span>
                    <strong th:text="${priceStats != null ? #numbers.formatInteger(priceStats.minPrice, 3, 'COMMA') + '원' : '0원'}">0원</strong>
                </div>
            </div>
        </div>

        <!-- 판매상품 패널 -->
        <section class="sps-panel is-show" id="sps-panel-sell" role="tabpanel">
            <div class="sps-sellTop" aria-label="상품 정렬">
                <div class="sps-sort" role="tablist" aria-label="정렬 옵션">
                    
     <button class="sps-sortBtn"
        th:classappend="${sortType == null or sortType == 'latest' ? ' is-active' : ''}"
        type="button" role="tab" data-sort="latest">최신순</button>
<span class="sps-sep" aria-hidden="true"></span>

<button class="sps-sortBtn"
        th:classappend="${sortType == 'priceAsc' ? ' is-active' : ''}"
        type="button" role="tab" data-sort="priceAsc">가격낮은순</button>
<span class="sps-sep" aria-hidden="true"></span>

<button class="sps-sortBtn"
        th:classappend="${sortType == 'priceDesc' ? ' is-active' : ''}"
        type="button" role="tab" data-sort="priceDesc">높은가격순</button>
<span class="sps-sep" aria-hidden="true"></span>

<button class="sps-sortBtn"
        th:classappend="${sortType == 'view' ? ' is-active' : ''}"
        type="button" role="tab" data-sort="view">인기순</button>
                </div>
            </div>

            <div class="sps-grid" id="sps-grid">
                <article class="sps-card" th:each="product : ${list}">
                    <div class="sps-thumb-wrap">
    <a class="sps-thumb"
       th:href="@{/product/product_detail/{productNo}(productNo=${product.productNo})}">
        <span class="sps-badge"
              th:classappend="${
                   product.tradeStatus == '판매중' ? ' selling' :
                   (product.tradeStatus == '거래중' ? ' trading' : ' soldout')
              }"
              th:text="${product.tradeStatus}">판매중</span>

        <img th:src="@{${product.imgUrl}}" alt="">
    </a>

  <button class="sps-like"
        type="button"
        aria-label="찜"
        th:attr="data-product-no=${product.productNo}, data-login=${isLogin}"
        th:aria-pressed="${product.wished ? 'true' : 'false'}"
        th:classappend="${product.wished ? ' is-on' : ''}">
    <i th:class="${product.wished ? 'fa-solid fa-heart' : 'fa-regular fa-heart'}"></i>
</button>
</div>
                    <div class="sps-body">
                        <a class="sps-title"
                           th:href="@{/product/product_detail/{productNo}(productNo=${product.productNo})}"
                           th:text="${product.productName}">상품명</a>

                        <div class="sps-price"
                             th:text="${#numbers.formatInteger(product.productPrice, 3, 'COMMA') + '원'}">0원</div>

                        <div class="sps-meta">
                            <span>
                                <i class="fa-solid fa-location-dot"></i>
                                <span th:text="${product.placeName != null ? product.placeName : '지역정보 없음'}">강남구</span>
                            </span>
                            <span>
                                <i class="fa-regular fa-clock"></i>
                               <span class="time-ago" th:attr="data-time=${#dates.format(product.regDate, 'yyyy-MM-dd HH:mm:ss')}"></span>
                            </span>
                            <span>
                                <i class="fa-solid fa-eye"></i>
                                <span th:text="${product.viewCount}">0</span>
                            </span>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </div>

    <!-- 검색 결과 없음 -->
    <div class="no-result"
         th:if="${hasSearch and !hasResult}">
        <div class="no-result-inner">
            <i class="fa-solid fa-circle-exclamation"></i>
            <div class="no-result-text"
                 th:text="|&quot;${searchWord}&quot; 검색 결과가 없습니다.|">
                검색 결과가 없습니다.
            </div>
        </div>
    </div>

    <script th:inline="javascript">
    /*<![CDATA[*/
    window.ctxPath = /*[[@{/}]]*/ "";
    window.priceChartData = /*[[${priceChartData}]]*/ [];
    window.priceSearchWord = /*[[${searchWord}]]*/ "";
    window.priceSortType = /*[[${sortType}]]*/ "latest";
    window.priceStatsData = /*[[${priceStats}]]*/ null;
    window.priceMode = /*[[${priceMode}]]*/ "list";
    window.hasResult = /*[[${hasResult}]]*/ false;
    /*]]>*/
</script>
</main>
</body>
</html>
